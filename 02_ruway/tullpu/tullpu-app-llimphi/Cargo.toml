[package]
name = "tullpu-app-llimphi"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "tullpu — app de escritorio Llimphi: lienzo central + panel de capas + paleta de ops. MVP del editor de imágenes por capas IA-able."

[[bin]]
name = "tullpu"
path = "src/main.rs"

[dependencies]
tullpu-core = { path = "../tullpu-core" }
tullpu-render = { path = "../tullpu-render" }
tullpu-ops = { path = "../tullpu-ops" }
pixel-verbo-core = { path = "../pixel-verbo-core" }
pixel-verbo-mock = { path = "../pixel-verbo-mock" }
pixel-verbo-daemon = { path = "../pixel-verbo-daemon" }
foreign-psd = { path = "../../../shared/foreign-psd" }
llimphi-ui = { workspace = true }
llimphi-theme = { workspace = true }
llimphi-widget-button = { workspace = true }
llimphi-widget-slider = { workspace = true }
llimphi-widget-text-input = { workspace = true }
llimphi-module-file-picker = { workspace = true }
llimphi-widget-menubar = { workspace = true }
llimphi-widget-context-menu = { workspace = true }
llimphi-widget-edit-menu = { workspace = true }
llimphi-motion = { workspace = true }
llimphi-clipboard = { workspace = true }
app-bus = { workspace = true }
image = { workspace = true }
uuid = { workspace = true }
