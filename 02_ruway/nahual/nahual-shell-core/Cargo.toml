[package]
name = "nahual-shell-core"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "nahual-shell-core — lógica agnóstica del shell nahual: motor de búsqueda (find léxico por nombre/contenido + semántico por embeddings), glob-match y los tipos de resultado. Cero UI, cero Llimphi; cualquier frontend (Llimphi, CLI, web) lo consume."

[dependencies]
