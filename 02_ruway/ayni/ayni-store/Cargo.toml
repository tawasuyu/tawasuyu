# =============================================================================
#  ayni :: ayni-store — la conversación en disco
# -----------------------------------------------------------------------------
#  Local-first de verdad: tus mensajes sobreviven a que cierres la app y a que
#  muera cualquier empresa. Cada nodo del DAG se guarda direccionado por su id
#  (BLAKE3) en un store key-value embebido (sled), igual que `pluma-store` con
#  el grafo narrativo. Al reabrir, la conversación se reconstruye entera.
#
#  Es también la base del store-and-forward (P3): un par que estuvo offline
#  conserva su grafo y, al reconectar, la anti-entropía de `ayni-sync` sólo le
#  trae los eslabones que le faltan.
# =============================================================================

[package]
name = "ayni-store"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "ayni — persistencia del DAG de conversación sobre sled (local-first, base del store-and-forward)"

[lib]
doctest = false

[dependencies]
ayni-core = { path = "../ayni-core" }
sled = { workspace = true }
postcard = { workspace = true }
thiserror = { workspace = true }

[dev-dependencies]
ayni-crypto = { path = "../ayni-crypto" }
tempfile = { workspace = true }
