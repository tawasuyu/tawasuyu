# =============================================================================
#  ayni :: ayni-index — búsqueda semántica local del historial (P4)
# -----------------------------------------------------------------------------
#  "¿Dónde fue que hablamos de X?" sin mandar tu historial a ningún servidor:
#  cada mensaje se embebe a un vector con rimay (el mismo motor de embeddings de
#  la suite) y la búsqueda rankea por similitud coseno, todo en tu máquina.
#  Con MockProvider corre offline y determinista; en producción, el daemon de
#  rimay por socket Unix (DaemonClient) — una instancia = un modelo.
# =============================================================================

[package]
name = "ayni-index"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "ayni — índice semántico local del historial de chat (rimay embeddings + coseno)"

[lib]
doctest = false

[dependencies]
ayni-core = { path = "../ayni-core" }
rimay-verbo-core = { path = "../../../00_unanchay/rimay/rimay-verbo-core" }

[dev-dependencies]
rimay-verbo-mock = { path = "../../../00_unanchay/rimay/rimay-verbo-mock" }
tokio = { workspace = true }
