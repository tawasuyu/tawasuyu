# =============================================================================
#  ayni :: ayni-llimphi — la cara gráfica del chat soberano
# -----------------------------------------------------------------------------
#  Frontend Llimphi (bucle Elm) sobre los `*-core` agnósticos: el estado es una
#  Conversacion, el transporte un EnlaceTcp, la firma una Identidad. Un hilo de
#  red bombea los EventoRed al `update` vía Handle::dispatch. MVP feo a propósito
#  —lista de mensajes + input + enviar—: la funcionalidad antes que la estética.
#
#      AYNI_NOMBRE=Alicia AYNI_ESCUCHAR=127.0.0.1:7700 cargo run -p ayni-llimphi
#      AYNI_NOMBRE=Beto AYNI_ESCUCHAR=127.0.0.1:7701 \
#        AYNI_CONECTAR=127.0.0.1:7700 cargo run -p ayni-llimphi
# =============================================================================

[package]
name = "ayni-llimphi"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "ayni — UI Llimphi del chat soberano: conversación + gente (membresía/confianza) + adjuntos + recibos, sobre ayni-app"

[[bin]]
name = "ayni-llimphi"
path = "src/main.rs"

[dependencies]
# La UI es un frontend delgado sobre el núcleo de aplicación compartido: el
# transporte (TCP/minga), la persistencia, el cifrado, los adjuntos y la
# confianza viven todos en `ayni-app`.
ayni-app = { path = "../ayni-app" }
llimphi-ui = { workspace = true }
blake3 = { workspace = true }

# Input de mensaje sobre `EditorState`, menú principal (barra) y menú de
# edición contextual reutilizables — todos comparten el mismo editor.
llimphi-theme = { workspace = true }
llimphi-widget-text-input = { workspace = true }
llimphi-widget-menubar = { workspace = true }
llimphi-widget-edit-menu = { workspace = true }
llimphi-widget-context-menu = { workspace = true }
llimphi-motion = { workspace = true }
llimphi-clipboard = { workspace = true }
app-bus = { workspace = true }
