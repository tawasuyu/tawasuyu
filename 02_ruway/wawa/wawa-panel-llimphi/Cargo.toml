[package]
name = "wawa-panel-llimphi"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true

[[bin]]
name = "wawa-panel"
path = "src/main.rs"

[dependencies]
llimphi-ui = { workspace = true }
llimphi-theme = { workspace = true }
llimphi-widget-app-header = { workspace = true }
llimphi-widget-button = { workspace = true }
llimphi-widget-menubar = { workspace = true }
llimphi-widget-context-menu = { workspace = true }
llimphi-motion = { workspace = true }
llimphi-widget-dock-rail = { workspace = true }
llimphi-widget-splitter = { workspace = true }
# Toasts efímeros: confirmaciones de guardado y errores de persistencia.
llimphi-widget-toast = { workspace = true }
llimphi-module-allichay = { workspace = true }
# Diálogo de abrir archivo (elegir wallpaper, etc.).
llimphi-module-file-picker = { workspace = true }
app-bus = { workspace = true }
allichay = { workspace = true }
rimay-localize = { path = "../../../shared/rimay-localize" }
wawa-config = { path = "../../../shared/wawa-config" }
# Configs editables de las apps suscritas: el panel monta sus schemas.
mirada-brain = { path = "../../mirada/mirada-brain" }
pata-core = { path = "../../pata/pata-core" }
pata-config = { path = "../../pata/pata-config" }
# Config de cuentas de correo (paloma): el diente «Correo» monta su schema.
paloma-config = { path = "../../paloma/paloma-config" }
# Contextos + dotfiles (pacha): el diente «Contextos» edita pachas.ron y muestra
# el estado del versionado/cifrado de dotfiles.
pacha-core = { path = "../../../shared/pacha/pacha-core" }
pacha-dotfiles = { path = "../../../shared/pacha/pacha-dotfiles" }
pacha-llavero = { path = "../../../shared/pacha/pacha-llavero" }
directories = { workspace = true }
# Editor de recorrido (Prezi) de la vista espacial: lienzo libre + rotación.
pluma-deck-core = { path = "../../../00_unanchay/pluma/pluma-deck-core" }
pluma-deck-recorrido-llimphi = { path = "../../../00_unanchay/pluma/pluma-deck-recorrido-llimphi" }
# Biblioteca de perfiles de escritorio: cada perfil = config completa (mirada +
# keymap + barra pata) serializada en un solo RON.
serde = { workspace = true }
ron = { workspace = true }
# Captura headless del panel a PNG (`wawa-panel --shot`), para verificar la UI
# sin abrir ventana.
png = { workspace = true }
pollster = { workspace = true }
