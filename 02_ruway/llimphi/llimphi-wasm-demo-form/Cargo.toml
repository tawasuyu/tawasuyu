[package]
name = "llimphi-wasm-demo-form"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "llimphi-wasm-demo-form — app WASM Tier 3 de ejemplo con formulario: un campo de texto (nombre), un checkbox (mayúsculas) y un saludo vivo. Ejercita los eventos con payload (Text/Toggle) además de Click. Se compila a wasm32 (scripts/build-wasm-demo.sh) y corre en el host con llimphi-wasm-runner."

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
llimphi-wasm-app-sdk = { workspace = true }
