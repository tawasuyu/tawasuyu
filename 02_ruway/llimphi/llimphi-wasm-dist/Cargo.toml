[package]
name = "llimphi-wasm-dist"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "llimphi-wasm-dist — cara con baterías de la distribución Tier 3: re-exporta llimphi-wasm-core (CAS, verificación de integridad y concesión Ed25519, resolve/resolve_manifest, cableado de app_bus::Launch::Wasm) y le suma el runner para correr la VerifiedApp (VerifiedAppExt::load). Quien sólo distribuye/verifica usa llimphi-wasm-core y se ahorra el stack GPU."

