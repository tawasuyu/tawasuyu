description = "llimphi-wasm-core — núcleo puro de la distribución por hash de apps WASM Tier 3: CAS (DiskStore/MapSource/LayeredSource sobre el trait BlobSource), hash canónico de objeto (bytecode/concesión), verificación de integridad y de concesión Ed25519 contra un anillo de confianza cargable, AppRef/AppManifest y resolve/resolve_manifest con permisos efectivos. NO depende del runner ni de Llimphi (sin GPU): un servidor de blobs o relay headless lo usa sin arrastrar wgpu/vello/winit. El puente para correr la VerifiedApp vive en llimphi-wasm-dist."

