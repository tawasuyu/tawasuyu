[package]
name = "uya-app"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "uya â capa de aplicaciÃģn: transporte TCP, captura de video y bus de eventos de la videollamada, sobre uya-core"

[lib]
doctest = false

[features]
default = []
# Captura desde una webcam real (v4l2, Linux) en vez de la TestCard sintÃĐtica.
# Off por defecto para que `cargo check --workspace` no arrastre v4l2/libclang.
camara = ["media-source-capture/camera"]

[dependencies]
uya-core = { path = "../uya-core" }
# TestCard (gradiente animado): la "cÃĄmara" por defecto, sin tocar hardware ni
# sumar dependencias de sistema â el pipeline anda en cualquier mÃĄquina. Aporta
# ademÃĄs el trait `AudioSource` y `ToneSource` (tono sintÃĐtico del micrÃģfono).
media-core = { path = "../../media/media-core" }
# MicrÃģfono real vÃ­a cpal (feature `mic`, siempre); cÃĄmara v4l2 sÃģlo bajo
# `camara`. El nÃšcleo `live_audio`/`convert` no toca hardware.
media-source-capture = { path = "../../media/media-source-capture", default-features = false, features = ["mic"] }
# ReproducciÃģn de audio por el dispositivo de salida (cpal).
media-audio-cpal = { path = "../../media/media-audio-cpal" }
# El `AudioSink` lockea la fuente con un `parking_lot::Mutex` en su callback
# realtime; usamos el mismo tipo para la `MezclaRemota`.
parking_lot = { workspace = true }
# Transporte P2P soberano: el mismo nodo libp2p (relay/dcutr/autonat) que usan
# ayni/minga/agora. Streams multiplexados por `StreamProtocol`.
card-net = { path = "../../../shared/card/card-net" }
tokio = { workspace = true }
# `.compat()` adapta el `Stream` libp2p (futures io) a tokio io; `futures`
# aporta el `StreamExt` del aceptador de streams entrantes.
tokio-util = { workspace = true }
futures = { workspace = true }
# CompresiÃģn de cuadros: JPEG (MJPEG) encode/decode. El mismo `image` del
# workspace (feature jpeg ya activa).
image = { workspace = true }
# CompresiÃģn de audio: encoder Opus nativo (puro-Rust) para el micrÃģfono...
media-encode-opus = { path = "../../media/media-encode-opus" }
# ...y el decoder Opus en streaming (un `OpusDecoder` por par en el lector).
opus-wave = { workspace = true }
# Baliza LAN: socket UDP multicast con SO_REUSEPORT + IP_MULTICAST_LOOP.
socket2 = "0.5"
