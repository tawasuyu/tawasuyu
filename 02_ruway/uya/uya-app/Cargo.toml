# =============================================================================
#  uya :: uya-app — el pegamento: transporte + captura + identidad
# -----------------------------------------------------------------------------
#  Capa de aplicación compartida entre la CLI y el frontend Llimphi: levanta el
#  transporte (TCP punto-a-punto, el mismo patrón MVP que `ayni`), corre la
#  captura de video (TestCard sintética por defecto; cámara real v4l2 tras la
#  feature `camara`) y reinyecta los eventos de la llamada (`EventoUya`) por un
#  canal `std::mpsc` que la UI consume —exactamente como `ayni-app::Enlace`.
#
#  El transporte soberano destino es card-net (P2P con relay/dcutr/autonat ya
#  hechos); arrancamos sobre TCP crudo para tener la llamada andando hoy (MVP
#  feo a propósito) y mudarla a card-net sin tocar `uya-core` ni la UI.
# =============================================================================

[package]
name = "uya-app"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "uya — capa de aplicación: transporte TCP, captura de video y bus de eventos de la videollamada, sobre uya-core"

[lib]
doctest = false

[features]
default = []
# Captura desde una webcam real (v4l2, Linux) en vez de la TestCard sintética.
# Off por defecto para que `cargo check --workspace` no arrastre v4l2/libclang.
camara = ["media-source-capture/camera"]
# Compartir pantalla: habilita los backends de captura de display (Wayland
# wlr-screencopy + X11), ambos puro-Rust (sin libclang). Off por defecto para
# no sumar deps de sistema al build mínimo; el botón "compartir pantalla" de la
# UI sólo hace efecto si se compiló con esta feature. Correr necesita un
# compositor wlroots o un servidor X.
pantalla = ["media-source-capture/wayland", "media-source-capture/screen"]

[dependencies]
uya-core = { path = "../uya-core" }
# Identidad soberana: el par Ed25519 que firma el `Hola` (misma cripto que
# agora/ayni). La clave secreta nace de una semilla persistida en disco; el id
# del participante es la huella BLAKE3 de la pública. `verify_signature` cierra
# el lazo en recepción.
agora-core = { path = "../../../03_ukupacha/agora/agora-core" }
# Semilla aleatoria (CSPRNG del sistema) para una identidad nueva.
rand = { workspace = true }
# TestCard (gradiente animado): la "cámara" por defecto, sin tocar hardware ni
# sumar dependencias de sistema — el pipeline anda en cualquier máquina. Aporta
# además el trait `AudioSource` y `ToneSource` (tono sintético del micrófono).
media-core = { path = "../../media/media-core" }
# Micrófono real vía cpal (feature `mic`, siempre); cámara v4l2 sólo bajo
# `camara`. El núcleo `live_audio`/`convert` no toca hardware.
media-source-capture = { path = "../../media/media-source-capture", default-features = false, features = ["mic"] }
# Reproducción de audio por el dispositivo de salida (cpal).
media-audio-cpal = { path = "../../media/media-audio-cpal" }
# El `AudioSink` lockea la fuente con un `parking_lot::Mutex` en su callback
# realtime; usamos el mismo tipo para la `MezclaRemota`.
parking_lot = { workspace = true }
# Transporte P2P soberano: el mismo nodo libp2p (relay/dcutr/autonat) que usan
# ayni/minga/agora. Streams multiplexados por `StreamProtocol`.
card-net = { path = "../../../shared/card/card-net" }
tokio = { workspace = true }
# `.compat()` adapta el `Stream` libp2p (futures io) a tokio io; `futures`
# aporta el `StreamExt` del aceptador de streams entrantes.
tokio-util = { workspace = true }
futures = { workspace = true }
# Compresión de cuadros: JPEG (MJPEG) encode/decode. El mismo `image` del
# workspace (feature jpeg ya activa).
image = { workspace = true }
# Compresión de audio: encoder Opus nativo (puro-Rust) para el micrófono...
media-encode-opus = { path = "../../media/media-encode-opus" }
# ...y el decoder Opus en streaming (un `OpusDecoder` por par en el lector).
opus-wave = { workspace = true }
# Baliza LAN: socket UDP multicast con SO_REUSEPORT + IP_MULTICAST_LOOP.
socket2 = "0.5"
# Enumerar interfaces IPv4 para unirse/emitir el multicast por TODAS (no sólo
# la default) — robusto en desktops con varias NIC (wifi+eth+docker+VPN).
if-addrs = "0.15"
