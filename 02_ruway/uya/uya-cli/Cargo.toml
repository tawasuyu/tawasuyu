# =============================================================================
#  uya :: uya-cli — nodo headless de la videollamada (sin GPU)
# -----------------------------------------------------------------------------
#  Ejercita el transporte y la captura sin levantar la UI: arranca un `Enlace`,
#  corre la TestCard y reporta por consola los eventos (entra/sale/estado +
#  conteo de cuadros). Útil para probar la señalización entre dos procesos o
#  como el otro extremo de una llamada con `uya-llimphi`.
#
#      UYA_NOMBRE=Beto UYA_ESCUCHAR=127.0.0.1:7801 \
#        UYA_CONECTAR=127.0.0.1:7800 cargo run -p uya-cli
# =============================================================================

[package]
name = "uya-cli"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "uya — nodo headless: transporte + captura + log de eventos de la videollamada"

[[bin]]
name = "uya-cli"
path = "src/main.rs"

[features]
default = []
# Pasarela a los backends de hardware/sistema de `uya-app` (compartir pantalla,
# webcam). P. ej. `cargo run -p uya-cli --features pantalla` con UYA_PANTALLA=1.
pantalla = ["uya-app/pantalla"]
camara = ["uya-app/camara"]

[dependencies]
uya-app = { path = "../uya-app" }
