[package]
name = "shuma-module-shell"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "shuma-module-shell — el shell interactivo (input + runs + historial) como un módulo enchufable a `shuma-shell-llimphi`. Vista placeholder por ahora; la migración del REPL GPUI llega aparte."

[dependencies]
shuma-module = { path = "../shuma-module" }
shuma-exec = { path = "../shuma-exec" }
shuma-remote-exec = { path = "../shuma-remote-exec" }
shuma-protocol = { path = "../shuma-protocol" }
shuma-link = { path = "../shuma-link" }
ulid = { workspace = true }
shuma-line = { path = "../shuma-line" }
shuma-history = { path = "../shuma-history" }
shuma-config = { path = "../shuma-config" }
# Config global del SO: la IA + semántica viven acá (no per-app), editadas en
# wawa-panel. Los builtins (`:?`/`:buscar`) la leen en vivo.
wawa-config = { path = "../../../../shared/wawa-config" }
# Catálogo de capacidades de control de la suite (mirada/sandokan/…): `:hacé`
# lo incrusta en el prompt para que el LLM elija una acción real, no shell libre.
atipay = { path = "../../../../shared/atipay" }
shuma-intent = { path = "../shuma-intent" }
shuma-infer = { path = "../shuma-infer" }
# Cotejo de pluma: comparar la salida de dos bloques al estilo pluma —
# alineación párrafo-a-párrafo por similitud léxica (Needleman–Wunsch),
# clasifica idéntica/similar/divergente/agregada/eliminada (no un diff exacto).
pluma-core = { path = "../../../../00_unanchay/pluma/pluma-core" }
pluma-cuerpo = { path = "../../../../00_unanchay/pluma/pluma-cuerpo" }
pluma-cotejo = { path = "../../../../00_unanchay/pluma/pluma-cotejo" }
uuid = { workspace = true }
llimphi-ui = { workspace = true }
llimphi-theme = { workspace = true }
llimphi-icons = { workspace = true }
llimphi-widget-scroll = { workspace = true }
llimphi-widget-text-editor = { workspace = true }
llimphi-widget-terminal = { workspace = true }
llimphi-widget-context-menu = { workspace = true }
llimphi-image = { workspace = true }
# Decodificador kitty/sixel: extrae las imágenes del stream del PTY antes de
# que lleguen al vt100 (que las descartaría).
llimphi-term-graphics = { workspace = true }
vt100 = { workspace = true }
arboard = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
toml = { workspace = true }
similar = { workspace = true }

[dev-dependencies]
png = { workspace = true }
pollster = { workspace = true }
tempfile = { workspace = true }
base64 = { workspace = true }
