[package]
name = "shuma-term-llimphi"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "Terminal interactivo Llimphi: abre un ambiente aislado de sandokan (shell en PTY), se conecta a su <card_id>.sock y pinta el grid de shuma-term. Front del plano interactivo."

[[bin]]
name = "shuma-term"
path = "src/main.rs"

[dependencies]
llimphi-ui = { workspace = true }
shuma-term = { path = "../sandbox/shuma-term" }
sandokan-core = { path = "../../../shared/sandokan/sandokan-core" }
sandokan-local = { path = "../../../03_ukupacha/sandokan/sandokan-local" }
card-core = { path = "../../../shared/card/card-core" }
tokio = { workspace = true }
