[package]
name = "shuma-shell-llimphi"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "shuma-shell-llimphi — chasis Llimphi del shell shuma con sistema de módulos enchufables: tabs principales por módulo, stack de monitores en el panel derecho y toolbar de shortcuts en el header. Reemplazo de la versión GPUI; los módulos vienen aparte."

[[bin]]
name = "shuma-shell-llimphi"
path = "src/main.rs"

[dependencies]
shuma-module = { path = "../sandbox/shuma-module" }
shuma-module-commandbar = { path = "../sandbox/shuma-module-commandbar" }
shuma-module-launcher = { path = "../sandbox/shuma-module-launcher" }
shuma-module-matilda = { path = "../sandbox/shuma-module-matilda" }
matilda-core = { path = "../baremetal/matilda-core" }
shuma-module-minga = { path = "../sandbox/shuma-module-minga" }
minga-core = { path = "../../../03_ukupacha/minga/minga-core" }
shuma-module-shell = { path = "../sandbox/shuma-module-shell" }
shuma-module-canvas = { path = "../sandbox/shuma-module-canvas" }
shuma-intent = { path = "../sandbox/shuma-intent" }
shuma-sysmon = { path = "../sandbox/shuma-sysmon" }
pata-host = { path = "../../pata/pata-host" }
llimphi-ui = { workspace = true }
llimphi-theme = { workspace = true }
# Rail de dientes (el último widget): las tabs del shell (shell/lienzo/matilda) y
# el toggle de monitores viven como dientes en una franja vertical a la derecha,
# reemplazando la vieja tira horizontal de tabs.
llimphi-widget-dock-rail = { workspace = true }
llimphi-widget-splitter = { workspace = true }
llimphi-widget-stat-card = { workspace = true }
llimphi-widget-menubar = { workspace = true }
llimphi-widget-context-menu = { workspace = true }
llimphi-motion = { workspace = true }
app-bus = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
toml = { workspace = true }
directories = { workspace = true }
rimay-localize = { path = "../../../shared/rimay-localize" }
wawa-config = { path = "../../../shared/wawa-config" }
wawa-config-llimphi = { path = "../../../shared/wawa-config-llimphi" }

[dev-dependencies]
tempfile = { workspace = true }
