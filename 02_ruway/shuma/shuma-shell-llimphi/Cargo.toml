[package]
name = "shuma-shell-llimphi"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "shuma-shell-llimphi — chasis Llimphi del shell shuma con sistema de módulos enchufables: tabs principales por módulo, stack de monitores en el panel derecho y toolbar de shortcuts en el header. Reemplazo de la versión GPUI; los módulos vienen aparte."

[[bin]]
name = "shuma-shell-llimphi"
path = "src/main.rs"

[dependencies]
shuma-module = { path = "../sandbox/shuma-module" }
shuma-module-commandbar = { path = "../sandbox/shuma-module-commandbar" }
shuma-module-launcher = { path = "../sandbox/shuma-module-launcher" }
shuma-module-matilda = { path = "../sandbox/shuma-module-matilda" }
shuma-module-shell = { path = "../sandbox/shuma-module-shell" }
shuma-sysmon = { path = "../sandbox/shuma-sysmon" }
llimphi-ui = { workspace = true }
llimphi-theme = { workspace = true }
llimphi-widget-tabs = { workspace = true }
llimphi-widget-splitter = { workspace = true }
llimphi-widget-stat-card = { workspace = true }
