[package]
name = "shuma-shell-llimphi"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "shuma-shell-llimphi — chasis Llimphi del shell shuma con sistema de módulos enchufables: tabs principales por módulo, stack de monitores en el panel derecho y toolbar de shortcuts en el header. Reemplazo de la versión GPUI; los módulos vienen aparte."

[[bin]]
name = "shuma-shell-llimphi"
path = "src/main.rs"

[dependencies]
bitacora = { workspace = true }
shuma-module = { path = "../sandbox/shuma-module" }
shuma-module-commandbar = { path = "../sandbox/shuma-module-commandbar" }
shuma-module-launcher = { path = "../sandbox/shuma-module-launcher" }
shuma-module-matilda = { path = "../sandbox/shuma-module-matilda" }
matilda-core = { path = "../baremetal/matilda-core" }
shuma-module-minga = { path = "../sandbox/shuma-module-minga" }
minga-core = { path = "../../../03_ukupacha/minga/minga-core" }
shuma-module-shell = { path = "../sandbox/shuma-module-shell" }
shuma-config = { path = "../sandbox/shuma-config" }
shuma-module-canvas = { path = "../sandbox/shuma-module-canvas" }
shuma-module-agente = { path = "../sandbox/shuma-module-agente" }
shuma-agente = { path = "../sandbox/shuma-agente" }
# Voz manos-libres: captura de micrófono + lazo VAD→STT→máquina. La feature
# `microfono` (default-on) trae cpal; el host la corre con la config de wawa-panel.
rimay-voz-host = { path = "../../../00_unanchay/rimay/rimay-voz-host" }
rimay-voz = { path = "../../../00_unanchay/rimay/rimay-voz" }
shuma-agente-host = { path = "../sandbox/shuma-agente-host" }
shuma-intent = { path = "../sandbox/shuma-intent" }
shuma-sysmon = { path = "../sandbox/shuma-sysmon" }
pata-host = { path = "../../pata/pata-host" }
llimphi-ui = { workspace = true }
# Modo dock: correr shuma como barra wlr-layer-shell anclada a un borde.
llimphi-layer = { workspace = true }
llimphi-theme = { workspace = true }
llimphi-image = { workspace = true }
# Rail de dientes (el último widget): las tabs del shell (shell/lienzo/matilda) y
# el toggle de monitores viven como dientes en una franja vertical a la derecha,
# reemplazando la vieja tira horizontal de tabs.
llimphi-widget-dock-rail = { workspace = true }
llimphi-widget-splitter = { workspace = true }
# Árbol de paneles BSP (tiling tipo zellij) del canvas de cada sesión.
llimphi-widget-panes = { workspace = true }
llimphi-widget-stat-card = { workspace = true }
# Modernización visual: skeleton shimmer mientras el Explorer remoto lista,
# empty-state del historial vacío, e iconos vectoriales para ese empty-state.
llimphi-widget-skeleton = { workspace = true }
llimphi-widget-empty = { workspace = true }
llimphi-icons = { workspace = true }
llimphi-widget-menubar = { workspace = true }
llimphi-widget-context-menu = { workspace = true }
# Dropdown/select para la config de la sesión (aislamiento + distro).
llimphi-widget-select = { workspace = true }
# Diálogos bloqueantes (centrados con scrim) para crear host/contenedor desde
# el form de sesión nueva — reemplazan las viejas ventanas secundarias.
llimphi-widget-modal = { workspace = true }
# Campos del form de conexión remota (host/usuario/puerto).
llimphi-widget-text-input = { workspace = true }
llimphi-motion = { workspace = true }
app-bus = { workspace = true }
# Open-with por contenido: discierne el tipo del archivo (clic en el Explorer)
# y lo abre con el visor de la suite vía app-bus, como hace nahual.
shuma-discern = { path = "../sandbox/shuma-discern" }
serde = { workspace = true }
serde_json = { workspace = true }
ron = { workspace = true }
toml = { workspace = true }
directories = { workspace = true }
rimay-localize = { path = "../../../shared/rimay-localize" }
wawa-config = { path = "../../../shared/wawa-config" }
wawa-config-llimphi = { path = "../../../shared/wawa-config-llimphi" }
# E5 — LLM como instrumento invocado (`:?`/`:explica`/`:resume`). El módulo
# sólo expresa la intención; el chasis corre pluma-llm en un thread.
pluma-llm = { path = "../../../00_unanchay/pluma/pluma-llm" }
# Búsqueda semántica (`:buscar`): embeddings por el daemon rimay-verbo, con
# fallback a mock determinista si no hay daemon. El chasis embebe en un thread.
rimay-verbo = { path = "../../../00_unanchay/rimay/rimay-verbo" }
# Índice semántico persistido (embeddings en disco, formato nativo postcard) —
# evita re-embeber el corpus en cada `:buscar`.
postcard = { workspace = true }
tokio = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
# Render headless del pantallazo del workspace (tabs + tiling + flotantes).
pollster = { workspace = true }
png = { workspace = true }
llimphi-widget-panes = { workspace = true }
