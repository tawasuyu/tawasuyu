[package]
name = "shuma-shell"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "Shell shuma — input de comandos inteligente (resaltado + autocompletado + pipes), monitores de CPU/memoria y lienzo de intenciones."

[[bin]]
name = "shuma-shell"
path = "src/main.rs"

[dependencies]
shuma-line = { path = "../sandbox/shuma-line" }
shuma-session = { path = "../sandbox/shuma-session" }
shuma-history = { path = "../sandbox/shuma-history" }
shuma-exec = { path = "../sandbox/shuma-exec" }
shuma-infer = { path = "../sandbox/shuma-infer" }
shuma-sysmon = { path = "../sandbox/shuma-sysmon" }
# El protocolo de control de carmen — el modo launcher lista y enfoca
# ventanas a través de él.
mirada-brain = { path = "../../mirada/mirada-brain" }
# Herramienta matilda, embebida en la ventana del shell.
matilda-core = { path = "../baremetal/matilda-core" }
matilda-plan = { path = "../baremetal/matilda-plan" }
matilda-apply = { path = "../baremetal/matilda-apply" }
matilda-discover = { path = "../baremetal/matilda-discover" }
nahual-theme = { path = "../../nahual/libs/theme" }
nahual-launcher = { path = "../../nahual/libs/launcher" }
gpui = { workspace = true }
serde_json = { workspace = true }
