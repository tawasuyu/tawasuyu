[package]
name = "paloma-llimphi"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "paloma-llimphi — frontend del correo sobre Llimphi: tres paneles (buzones · hilos · lectura) + redacción, agnóstico al backend (MockBackend o NetBackend)."

[dependencies]
paloma-core = { path = "../paloma-core" }
paloma-store = { path = "../paloma-store" }
paloma-rail = { path = "../paloma-rail" }
paloma-contacts = { path = "../paloma-contacts" }
llimphi-ui = { workspace = true }
llimphi-theme = { workspace = true }
llimphi-widget-text-input = { workspace = true }
rimay-localize = { path = "../../../shared/rimay-localize" }
wawa-config = { path = "../../../shared/wawa-config" }

[dev-dependencies]
# El demo siembra un MockBackend; nada de red.

[[example]]
name = "buzon_demo"
path = "examples/buzon_demo.rs"
