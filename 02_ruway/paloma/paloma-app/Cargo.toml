[package]
name = "paloma-app"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "paloma-app — el binario lanzable del correo: arma el frontend Llimphi sobre NetBackend (IMAP+SMTP) desde la config de la cuenta, con fallback a datos de demo sin red."

[[bin]]
name = "paloma"
path = "src/main.rs"

[[bin]]
name = "paloma-test"
path = "src/bin/test_conexion.rs"

[dependencies]
paloma-core = { path = "../paloma-core" }
paloma-net = { path = "../paloma-net" }
paloma-store = { path = "../paloma-store" }
paloma-semantic = { path = "../paloma-semantic" }
paloma-rail = { path = "../paloma-rail" }
paloma-rail-net = { path = "../paloma-rail-net" }
paloma-contacts = { path = "../paloma-contacts" }
paloma-trust = { path = "../paloma-trust" }
paloma-llimphi = { path = "../paloma-llimphi" }
rimay-verbo = { path = "../../../00_unanchay/rimay/rimay-verbo" }
pluma-llm = { path = "../../../00_unanchay/pluma/pluma-llm" }
agora-core = { path = "../../../03_ukupacha/agora/agora-core" }
rand = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread"] }
llimphi-ui = { workspace = true }
llimphi-theme = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
directories = { workspace = true }
