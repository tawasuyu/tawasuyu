[package]
name = "supay-doom-llimphi"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "supay-doom-llimphi — Fase 1 de supay. Doom real corriendo en una ventana Llimphi: el motor C de doomgeneric (vendoreado en supay-core) avanza un tick por cada Msg::Tick (35 Hz vía Handle::spawn_periodic), el framebuffer 320×200 ARGB se pinta como `View::image` con aspect-fit, las pulsaciones de teclado se traducen a códigos Doom (KEY_FIRE, KEY_USE, KEY_*ARROW, etc.) y se enqueuean en el motor."

[[bin]]
name = "supay-doom-llimphi"
path = "src/main.rs"

[dependencies]
llimphi-ui = { workspace = true }
llimphi-theme = { workspace = true }
llimphi-widget-menubar = { workspace = true }
llimphi-widget-context-menu = { workspace = true }
llimphi-widget-text-input = { workspace = true }
llimphi-motion = { workspace = true }
app-bus = { workspace = true }
# Descarga in-app del WAD shareware: HTTP síncrono minimalista que corre en
# un hilo de fondo y reentra al update vía Handle::dispatch.
ureq = { workspace = true }
supay-core = { path = "../supay-core" }
supay-render-llimphi = { path = "../supay-render-llimphi" }
supay-wad = { path = "../supay-wad" }
supay-audio = { path = "../supay-audio" }
rimay-localize = { path = "../../../shared/rimay-localize" }

[dev-dependencies]
# Volcado headless de frames a PNG (examples/dump_frame.rs): render a textura
# vía llimphi-raster sobre llvmpipe + readback. Sirve para ver lo que el
# renderer produce sin levantar ventana ni event loop.
png = { workspace = true }
pollster = { workspace = true }
# Escena sintética construida a mano (examples/pantallazo_synth.rs) para ver
# el renderer sin doom1.wad ni el motor C.
supay-scene = { path = "../supay-scene" }

[[example]]
name = "dump_frame"
path = "examples/dump_frame.rs"

[[example]]
name = "pantallazo_synth"
path = "examples/pantallazo_synth.rs"
