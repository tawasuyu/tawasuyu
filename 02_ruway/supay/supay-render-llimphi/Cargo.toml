[package]
name = "supay-render-llimphi"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "supay-render-llimphi — Fase 3 de supay. Renderer 3D moderno que consume snapshots de supay-scene (Fase 2) y los pinta como `View::paint_with` de Llimphi. Cámara perspectiva CPU + clipping near-plane + back-face cull + painter's algorithm + shading por sector light + fog distante. Fase 3.0 vive sobre vello (rasterizador vectorial sobre wgpu); Fase 3.1+ migrará a un pase wgpu directo cuando llimphi-ui gane `View::custom_pass`."

[dependencies]
llimphi-ui = { workspace = true }
supay-scene = { path = "../supay-scene" }
supay-wad = { path = "../supay-wad" }
# Fase 2: renderer wgpu 2.5D (malla + depth buffer + texturas perspectiva-
# correctas). Mismo wgpu del workspace que Llimphi pasa a `gpu_paint_with`.
wgpu = { workspace = true }
glam = { workspace = true }
# Post-proceso genérico (SSAA + bloom) cosechado a Llimphi: supay es ahora
# consumidor de `llimphi-3d::PostFx` en vez de mantener su propio blit/bloom.
llimphi-3d = { path = "../../llimphi/llimphi-3d" }

[dev-dependencies]
# Validación headless de los shaders WGSL (sin GPU): naga parsea + valida
# los módulos en un test, atajando errores que de otro modo sólo saldrían
# al crear el pipeline en runtime.
naga = { version = "27", features = ["wgsl-in"] }
