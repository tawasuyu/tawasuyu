[package]
name = "takiy-app-llimphi"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "takiy-app-llimphi — piano roll visor sobre Llimphi. Carga un Score (default = demo built-in, o TAKIY_SCORE_JSON apunta a un .takiy.json), lo pinta como grid pitch×beats y lo reproduce con Space (cpal vía takiy-playback). Motor de síntesis: osc por default, SF2 vía MultiProgramRenderer si TAKIY_SF2 apunta a un soundfont. Edición sigue pendiente."

[lib]
name = "takiy_app"
path = "src/lib.rs"

[[bin]]
name = "takiy-app-llimphi"
path = "src/main.rs"

[[example]]
name = "smoke"
path = "examples/smoke.rs"

[[example]]
name = "pantallazo_takiy"
path = "examples/pantallazo_takiy.rs"

[dependencies]
takiy-core = { path = "../takiy-core" }
takiy-editor-core = { path = "../takiy-editor-core" }
takiy-synth = { path = "../takiy-synth" }
takiy-midi = { path = "../takiy-midi" }
takiy-playback = { path = "../takiy-playback" }
llimphi-ui = { workspace = true }
llimphi-theme = { workspace = true }
llimphi-widget-menubar = { workspace = true }
llimphi-widget-context-menu = { workspace = true }
llimphi-widget-toolbar = { workspace = true }
llimphi-widget-dock-rail = { workspace = true }
llimphi-widget-panel = { workspace = true }
llimphi-widget-splitter = { workspace = true }
llimphi-widget-slider = { workspace = true }
llimphi-widget-switch = { workspace = true }
llimphi-widget-segmented = { workspace = true }
llimphi-widget-button = { workspace = true }
llimphi-icons = { workspace = true }
llimphi-motion = { workspace = true }
app-bus = { workspace = true }
serde_json = { workspace = true }

[dev-dependencies]
# Sólo para el example `pantallazo_takiy` (volcado headless a PNG).
pollster = { workspace = true }
png = { workspace = true }
