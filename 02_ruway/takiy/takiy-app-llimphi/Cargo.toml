[package]
name = "takiy-app-llimphi"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "takiy-app-llimphi — piano roll visor sobre Llimphi. Carga un Score (default = demo built-in, o TAKIY_SCORE_JSON apunta a un .takiy.json) y lo pinta como grid pitch×beats con una nota = un rect. Solo visualización; edición y playback vendrán después."

[[bin]]
name = "takiy-app-llimphi"
path = "src/main.rs"

[dependencies]
takiy-core = { path = "../takiy-core" }
llimphi-ui = { workspace = true }
llimphi-theme = { workspace = true }
serde_json = { workspace = true }
