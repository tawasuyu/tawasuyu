[package]
name = "takiy-proyecto"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "takiy-proyecto — formato de proyecto .takiyproj con versionado: un DAG content-addressed (BLAKE3 + postcard, reusando shared/format) de snapshots de un Score. Mismo patrón de commits/padres que pluma-proyecto, pero para una partitura. Lógica pura, sin audio ni UI."

[dependencies]
