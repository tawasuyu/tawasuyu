[package]
name = "media-encode-av1"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "media/media-encode-av1 — encode AV1 NATIVO puro-Rust (rav1e) desde frames RGBA → contenedor IVF. Contraparte de media-source-av1: tawasuyu PRODUCE su formato de video nativo sin ffmpeg."

[dependencies]
# rav1e: encoder AV1 de referencia en Rust (Xiph/AOMedia). `default-features
# = false` saca el feature `asm` (que exige nasm en el host) → encode escalar
# puro, mismo criterio que rav1d en media-source-av1. Contraparte exacta del
# decoder: lo que este crate escupe, media-source-av1 lo reproduce sin tocar
# ffmpeg — el formato nativo de tawasuyu cierra el ciclo encode↔decode.
rav1e = { version = "0.8", default-features = false }

[dev-dependencies]
# Round-trip real: encode aquí → decode con el decoder nativo → verifica.
media-source-av1 = { path = "../media-source-av1" }
media-core = { path = "../media-core" } # trait FrameSource (tick)
