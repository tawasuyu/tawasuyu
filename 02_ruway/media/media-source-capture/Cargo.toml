[package]
name = "media-source-capture"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "media/source-capture — captura en vivo: cámara v4l2 · pantalla X11 (FrameSource) + micrófono cpal (AudioSource). Núcleos puros (conversión de pixel-formats + ring de audio) reusables; backends detrás de features opt-in."

[features]
# Núcleo puro (convert + LiveSource/LiveSink) por default — sin deps de
# hardware ni de build (no toca libclang). Es lo que valida `cargo check
# --workspace`.
default = []
# Backend de cámara v4l2 (Linux). OPT-IN: arrastra `v4l` → `v4l2-sys-mit` →
# bindgen → libclang, una dep de build pesada y frágil en builds paralelos.
# Por eso queda fuera del default (misma lógica que los puentes `foreign-*`).
# Activar con `--features camera` en plataformas con cabeceras videodev2 +
# libclang. Correr necesita un dispositivo `/dev/videoN` real.
camera = ["dep:v4l"]
# Backend de captura de pantalla X11. OPT-IN: arrastra `x11rb` (puro-Rust,
# habla el protocolo X11 por socket, sin lib C). Compila en cualquier lado;
# correr necesita un servidor X (`$DISPLAY`). Wayland sería otro backend.
screen = ["dep:x11rb"]
# Backend de micrófono vía cpal (ALSA/CoreAudio). OPT-IN como los demás
# backends de hardware. El núcleo `live_audio` (ring + drain) es puro y
# siempre compila; sólo este backend necesita cpal + un input device real.
mic = ["dep:cpal"]
# Backend de captura de pantalla Wayland vía wlr-screencopy (puro-Rust:
# wayland-client + wayland-protocols-wlr, con dlopen → ni libwayland en
# build). Funciona en compositores wlroots (Sway/Hyprland/river); GNOME/KDE
# necesitan portal+PipeWire (otro backend). rustix+memmap2 para el shm buffer.
wayland = ["dep:wayland-client", "dep:wayland-protocols-wlr", "dep:rustix", "dep:memmap2"]

[dependencies]
media-core = { path = "../media-core" }
# Sólo para decodificar el JPEG de los frames MJPEG de la webcam. El resto de
# las conversiones (YUYV/RGB/BGR) son aritmética propia, sin deps.
image = { workspace = true }

# Backend cámara: v4l es puro-Rust (ioctl vía libc, sin lib C externa).
v4l = { version = "0.14", optional = true }

# Backend pantalla: x11rb es puro-Rust (protocolo X11 por socket, RustConnection
# por default, sin enlazar libX11/libxcb).
x11rb = { version = "0.13", optional = true }

# Backend micrófono: cpal (mismo que el sink de salida `media-audio-cpal`).
cpal = { workspace = true, optional = true }

# Backend Wayland (wlr-screencopy). Puro-Rust; `dlopen` carga libwayland en
# runtime, no en build. rustix+memmap2 para el buffer shm de la copia.
wayland-client = { version = "0.31", optional = true, features = ["dlopen"] }
wayland-protocols-wlr = { version = "0.3", optional = true, features = ["client"] }
rustix = { version = "1", optional = true, features = ["fs", "mm"] }
memmap2 = { version = "0.9", optional = true }

[dev-dependencies]
media-recorder-webm = { path = "../media-recorder-webm" }

# Demo del loop pantalla→.webm. Sólo compila con la feature `screen`
# activa (necesita x11rb); el build por default lo ignora.
[[example]]
name = "grabar_pantalla"
required-features = ["screen"]

# Demo screencast con audio: pantalla + micrófono → .webm AV1+Opus.
[[example]]
name = "grabar_pantalla_audio"
required-features = ["screen", "mic"]
