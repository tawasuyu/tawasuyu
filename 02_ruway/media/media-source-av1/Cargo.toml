[package]
name = "media-source-av1"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "media/media-source-av1 — decode AV1 NATIVO puro-Rust (rav1d) desde contenedor IVF → FrameSource. AV1 es el formato de video nativo de tawasuyu."

[features]
# `decode` trae rav1d (decoder AV1 puro-Rust) y habilita `Av1VideoSource`.
# El demuxer IVF y el splitter de OBU son puro-Rust y NO dependen de él —
# sirven sin el feature (parseo de contenedor / inspección de bitstream).
default = ["decode"]
decode = ["dep:rav1d"]

[dependencies]
media-core = { path = "../media-core" }
libc = { workspace = true }
# rav1d: port puro-Rust de dav1d. `default-features = false` saca el feature
# `asm` (que exige nasm/gas en el host) — decode escalar puro, compila a WASM
# y corre en wawa. bitdepth_8 + bitdepth_16 cubren 8 y 10/12 bits.
rav1d = { version = "1.1.0", default-features = false, features = [
    "bitdepth_8",
    "bitdepth_16",
], optional = true }
