[package]
name = "brahman-broker-explorer"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Probe GUI del broker brahman: conecta cada N segundos vía await_provider_blocking con un Card observer agnóstico, reporta 3 estados (down / up sin provider / up con provider)."

[dependencies]
brahman-broker = { path = "../chasqui-broker" }
brahman-card = { path = "../../../shared/card/card-core" }
brahman-handshake = { path = "../../../shared/card/card-handshake" }
brahman-sidecar = { path = "../../../shared/card/card-sidecar" }
ulid = { workspace = true }
nahual-theme = { path = "../../nahual/libs/theme" }
nahual-launcher = { path = "../../nahual/libs/launcher" }
nahual-widget-banner = { path = "../../nahual/widgets/banner" }
nahual-widget-stat-card = { path = "../../nahual/widgets/stat-card" }
nahual-widget-app-header = { path = "../../nahual/widgets/app-header" }
gpui = { workspace = true }

[[bin]]
name = "brahman-broker-explorer"
path = "src/main.rs"
