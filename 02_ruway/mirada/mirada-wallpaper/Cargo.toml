[package]
name = "mirada-wallpaper"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "mirada-wallpaper — capa de decisión del fondo de escritorio: baja una imagen de un servicio público (Bing/NASA), la cachea y dispara el cambio en mirada reescribiendo wallpaper_path en config.ron (que el compositor recarga en caliente). El compositor no se entera de quién eligió la imagen."

[[bin]]
name = "mirada-wallpaper"
path = "src/main.rs"

[dependencies]
# Lee/valida config.ron y conoce la ruta canónica de la config de mirada.
mirada-brain = { path = "../mirada-brain" }
ureq = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
ron = { workspace = true }
directories = { workspace = true }
anyhow = { workspace = true }
blake3 = { workspace = true }
