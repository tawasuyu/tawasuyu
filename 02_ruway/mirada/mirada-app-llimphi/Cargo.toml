[package]
name = "mirada-app-llimphi"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "mirada (Llimphi) — el Cerebro del compositor: ventana Llimphi que tesela el escritorio sobre mirada-brain y manda la geometría al Cuerpo (smithay) por mirada-link. Reemplazo del `mirada-app` GPUI; sin Cuerpo arranca en simulación."

[[bin]]
name = "mirada-llimphi"
path = "src/main.rs"

[dependencies]
bitacora = { workspace = true }
mirada-brain = { path = "../mirada-brain" }
mirada-link = { path = "../mirada-link" }
# La barra de las vistas: pata-core define los presets de barra por vista y
# pata-config los serializa a ~/.config/pata/launcher.toml (que pata recarga en
# caliente). Núcleos agnósticos sin GPU — el panel sólo escribe el TOML.
pata-core = { path = "../../pata/pata-core" }
pata-config = { path = "../../pata/pata-config" }
llimphi-ui = { workspace = true }
llimphi-theme = { workspace = true }
llimphi-widget-menubar = { workspace = true }
llimphi-widget-context-menu = { workspace = true }
allichay = { workspace = true }
llimphi-module-allichay = { workspace = true }
llimphi-widget-empty = { workspace = true }
llimphi-icons = { workspace = true }
llimphi-motion = { workspace = true }
app-bus = { workspace = true }
rimay-localize = { path = "../../../shared/rimay-localize" }
wawa-config = { path = "../../../shared/wawa-config" }

[dev-dependencies]
png = { workspace = true }
pollster = { workspace = true }

[[example]]
name = "dump_overview"
path = "examples/dump_overview.rs"

[[example]]
name = "showreel"
path = "examples/showreel.rs"
