[package]
name = "mirada-greeter"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "mirada-greeter — el greeter de mirada: ventana Llimphi de login que autentica con auth-core y emite un SessionTicket al compositor por stdout."

[[bin]]
name = "mirada-greeter"
path = "src/main.rs"

[dependencies]
llimphi-ui = { workspace = true }
llimphi-theme = { workspace = true }
# Fondo Lottie configurable (lottie = /ruta.json en greeter.conf).
llimphi-lottie = { workspace = true }
# Fondo físico (bg = physics): tentáculos esqueletales con física Verlet.
llimphi-anim = { workspace = true }
llimphi-mesh = { workspace = true }
# Imagen cruda → peniko::Image para dibujar la chakana de marca al Scene.
llimphi-image = { workspace = true }
# Fondo por defecto unificado: la chakana animada de marca (núcleo sin vello).
mirada-fondo = { workspace = true, default-features = false }
llimphi-widget-text-input = { workspace = true }
llimphi-widget-menubar = { workspace = true }
llimphi-widget-edit-menu = { workspace = true }
llimphi-widget-context-menu = { workspace = true }
llimphi-motion = { workspace = true }
llimphi-clipboard = { workspace = true }
app-bus = { workspace = true }
auth-core = { path = "../../../shared/auth/auth-core" }
rimay-localize = { path = "../../../shared/rimay-localize" }
wawa-config = { path = "../../../shared/wawa-config" }
# Reloj de pared del greeter/lock: hora local con conciencia de zona horaria.
chrono = { workspace = true }
# Sólo para el modo `--shot` (captura headless de la UI a PNG, sin bootear el DM).
png = { workspace = true }
pollster = { workspace = true }
# Activación de backends de sistema por sesión: el greeter (DM) le pide a su
# init (arje-zero) encarnar el bundle de la sesión elegida (p. ej. los shims
# arje-compat que GNOME consulta). Best-effort, con tope de espera.
arje-bus = { path = "../../../03_ukupacha/arje/runtime/arje-bus" }
anyhow = { workspace = true }
tokio = { workspace = true }
