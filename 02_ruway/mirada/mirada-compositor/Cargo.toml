[package]
name = "mirada-compositor"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "mirada — el Cuerpo del compositor: un compositor Wayland teselante sobre smithay (backend winit, nested). Tesela con un Cerebro embebido o uno externo por mirada-link."

[[bin]]
name = "mirada-compositor"
path = "src/main.rs"

[dependencies]
mirada-brain = { path = "../mirada-brain" }
mirada-body = { path = "../mirada-body" }
mirada-link = { path = "../mirada-link" }
mirada-procedural = { path = "../mirada-procedural" }
auth-core = { path = "../../../shared/auth/auth-core" }
# Puente de drag-and-drop: reenvía a las apps tawasuyu las rutas soltadas
# (winit no recibe DnD en Wayland). Ver `started`/`dropped` en handlers.rs.
drop-bridge = { workspace = true }
nix = { workspace = true }
smithay = "0.7"
# Carga de temas de cursor XCursor (los sets tipo `Soberania`): localiza el tema
# en los directorios de íconos XDG y parsea los archivos a imágenes RGBA. Misma
# versión que ya arrastra smithay; la pedimos directa para usar el parser.
xcursor = "0.3"
# Rasterizado de texto sobre CPU (etiquetas: barra de título, menú). Es un
# rasterizador puro-Rust ligero; smithay sube el búfer RGBA como textura.
ab_glyph = "0.2"
# Decodifica y escala el wallpaper (PNG/JPEG/WebP) para componerlo en el fondo.
image = { workspace = true }
# Identidad visual central: el wallpaper de marca es el fondo por defecto cuando
# el usuario no configura ninguno (embebido; override por disco vía marca).
marca = { workspace = true }
# Wallpaper en VIDEO: foreign-av decodifica el archivo (mp4/webm/gif) a frames
# RGBA vía ffmpeg, y media-core trae los traits FrameSource/Seekable que el
# worker del fondo consume (tick/step_frame/seek_to). Sólo se usa con
# `wallpaper_source = "video"`; sin eso, no se toca.
foreign-av = { path = "../../../shared/foreign-av" }
media-core = { path = "../../media/media-core" }
