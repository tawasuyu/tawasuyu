[package]
name = "mirada-fondo"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "mirada-fondo — sistema unificado de fondos animados para las tres superficies de presentación de la suite (splash, greeter, wallpaper). El núcleo (FondoSpec + cache de frames + chakana de marca) es liviano y sin vello; el render de Lottie/rive a frames cacheados vive tras la feature `bake` (headless vello). El default de las tres es la chakana animada de la marca."

[features]
default = []
# Render headless (vello GPU offline + llimphi) de Lottie/rive a la cache de
# frames. Lo necesitan el bin `fondo-bake` y wawapanel; NO el splash/greeter/
# compositor, que sólo leen la cache (núcleo) y bliteant.
bake = [
    "dep:pollster",
    "dep:llimphi-ui",
    "dep:llimphi-lottie",
    "dep:llimphi-anim",
    "dep:llimphi-mesh",
    "dep:llimphi-image",
    "dep:llimphi-anim-studio",
]

[dependencies]
# Núcleo liviano: spec serializable + cache de frames + chakana CPU.
serde = { workspace = true, features = ["derive"] }
ron = { workspace = true }
png = { workspace = true }
directories = { workspace = true }
# La chakana animada (procedural CPU, sin vello) — el default de las tres superficies.
marca = { workspace = true }

# --- sólo con feature `bake` (deps pesadas de render) ---
# llimphi-ui reexporta hal/raster/vello/wgpu → un solo gancho al stack gráfico.
llimphi-ui = { workspace = true, optional = true }
pollster = { workspace = true, optional = true }
llimphi-lottie = { workspace = true, optional = true }
llimphi-anim = { workspace = true, optional = true }
llimphi-mesh = { workspace = true, optional = true }
llimphi-image = { workspace = true, optional = true }
# Tipos del proyecto «rive» (Doc + RigDoc) expuestos como lib por el studio.
llimphi-anim-studio = { workspace = true, optional = true }

[[bin]]
name = "fondo-bake"
path = "src/bin/fondo-bake.rs"
required-features = ["bake"]
