[package]
name = "asistente-puente"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "asistente-puente — puente Linux entre el asistente.wasm de wawa (vía Akasha) y los LLMs externos (vía pluma-llm). Scaffolding: hoy lee/escribe MensajeAsistente por stdin/stdout en postcard; el socket raw Akasha viene en una vuelta posterior."

[[bin]]
name = "asistente-puente"
path = "src/main.rs"

[lib]
name = "asistente_puente"
path = "src/lib.rs"

[dependencies]
bitacora = { workspace = true }
format = { path = "../../../shared/format" }
pluma-llm = { path = "../../../00_unanchay/pluma/pluma-llm" }
pluma-llm-core = { path = "../../../00_unanchay/pluma/pluma-llm-core" }
tokio = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
# Para el modo --akasha: AF_PACKET + ifindex lookup. nix expone
# `if_nametoindex` pero `AF_PACKET` low-level lo hacemos con libc
# directo — menos abstraccion, mas claridad sobre la ABI del kernel.
libc = { workspace = true }
# Fase 60 v4 :: el puente firma in-process cuando llega RequestFirma. Mismo
# crate que `wawactl daemon-firma` para que las claves del operador (seed
# 32 B o SecretKey 64 B) sean intercambiables entre los dos demonios.
ed25519-compact = { version = "2", default-features = false }
chrono = { workspace = true }

[dev-dependencies]
pluma-llm-mock = { path = "../../../00_unanchay/pluma/pluma-llm-mock" }
