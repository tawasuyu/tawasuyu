[package]
name = "mirada-launcher-llimphi"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "mirada (Llimphi) — launcher/panel configurable: barra al estilo eww + panel tipo conky, widgets builtin (clock, ram, cpu, quake-input...), config TOML. Brutos editan TOML; expertos enchufan Rhai (defer)."

[[bin]]
name = "mirada-launcher-llimphi"
path = "src/main.rs"

[lib]
path = "src/lib.rs"

[dependencies]
llimphi-ui = { workspace = true }
llimphi-theme = { workspace = true }
llimphi-widget-menubar = { workspace = true }
llimphi-motion = { workspace = true }
app-bus = { workspace = true }
serde = { workspace = true }
toml = { workspace = true }
chrono = { workspace = true }
pluma-llm = { path = "../../../00_unanchay/pluma/pluma-llm" }
tokio = { workspace = true }
# Bandeja del sistema (StatusNotifierItem): watcher+host en un hilo aparte con
# zbus async sobre tokio current-thread; íconos PNG/pixmap vía `image`.
zbus = { workspace = true }
image = { workspace = true }
