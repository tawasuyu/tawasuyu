[package]
name = "hapiy"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "hapiy — CLI de captura de pantalla de la suite: captura pantalla/monitor/región, guarda PNG y la abre en tullpu para anotar (--edit). Backends en hapiy-capture (nativo zwlr_screencopy + grim)."

[[bin]]
name = "hapiy"
path = "src/main.rs"

[dependencies]
hapiy-core = { path = "../hapiy-core" }
hapiy-capture = { path = "../hapiy-capture" }
