[package]
name = "hapiy-capture"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "hapiy — backends de captura tras el trait Capturer: cliente zwlr_screencopy nativo (feature `wayland`) + fallback grim. Compartido por el CLI y la GUI."

[features]
default = ["wayland"]
wayland = ["dep:wayland-client", "dep:wayland-protocols-wlr", "dep:memmap2", "dep:tempfile"]

[dependencies]
hapiy-core = { path = "../hapiy-core" }
image = { workspace = true }
wayland-client = { workspace = true, optional = true }
wayland-protocols-wlr = { workspace = true, optional = true }
memmap2 = { workspace = true, optional = true }
tempfile = { version = "3", optional = true }
