[package]
name = "pata-llimphi"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "pata — el frontend Linux: monta el modelo de pata-core sobre Llimphi. Resuelve la geometría de las superficies (barras/paneles/dock) y pinta cada widget traduciendo su view-model agnóstico al backend gráfico. Muestrea el sistema (reloj, CPU, RAM, volumen, brillo) en un WidgetCtx que alimenta a los widgets. Corre sobre el compositor mirada."

[[bin]]
name = "pata-llimphi"
path = "src/main.rs"

[lib]
path = "src/lib.rs"

[dependencies]
pata-core = { path = "../pata-core" }
pata-config = { path = "../pata-config" }
# Rail hospedado (sidebar delegado): pata hospeda los dientes de la app enfocada
# y le reenvía las activaciones. Lado servidor del protocolo.
pata-host = { path = "../pata-host" }
# El front universal de nahual, hospedado como módulo en un drawer Quake
# (Super+E). Mismo motor que nahual-shell sobre nahual-source-core; pata le
# rutea eventos y ejecuta sus Effects (miniaturas, lanzar apps).
nahual-module = { path = "../../nahual/nahual-module" }
# El puente pata→shuma (SDD §5): el marco provee el borde, shuma el contenido.
# El drawer Quake **hospeda el shell real de shuma** montando el módulo
# `shuma-module-shell` —el mismo de `shuma-shell-llimphi`, con cards, cuerpo
# IDE-text, scroll y detección PTY/TUI—. pata no reimplementa nada: instancia su
# `State`, le rutea teclas/tick/clicks (vía el `lift` Msg::ShumaShell) y pinta su
# `view`. Reemplaza al viejo reimplemento de cards + al terminal PTY aparte.
shuma-module-shell = { path = "../../shuma/sandbox/shuma-module-shell" }
# Vocabulario común de los módulos de shuma — `Source` (Local/Daemon/…) para
# construir el `State` del shell hospedado.
shuma-module = { path = "../../shuma/sandbox/shuma-module" }
# La shuma COMPLETA (Model + chrome con dientes/sesiones) como lib hosteable
# (Regla 2). Para el drawer con paridad total al standalone: pata construye su
# Model con `new_model()`, lo tickea con un Handle lifteado y pinta
# `view(model).map(...)`. Sin ciclo: shuma-shell-llimphi → pata-host (hoja).
shuma-shell-llimphi = { path = "../../shuma/shuma-shell-llimphi" }
# Registro de apps para el menú del botón de inicio (descubre ~/.config/tawasuyu/
# apps/*.toml). El menú nativo reemplaza a depender de wofi/rofi externos.
app-bus = { path = "../../../shared/app-bus" }
# El motor RAG sobre el correo de paloma, hospedado como sidebar: lee la caché en
# disco de paloma de sólo-lectura (corpus + índice semántico), embebe la consulta
# por el daemon de rimay-verbo, recupera los mails relevantes y redacta una
# respuesta citada con pluma-llm. pata sólo le rutea el input y pinta el panel.
paloma-rag = { path = "../../paloma/paloma-rag" }
llimphi-ui = { workspace = true }
# Área de scroll del historial del drawer (clip + offset + barra arrastrable).
llimphi-widget-scroll = { workspace = true }
# Sidebars acoplables (Fase 11c): rail de dientes + navegador de Mónadas/archivos
# + toggle Árbol/Grafo. El plano de datos lo provee nouser vía chasqui-card.
llimphi-widget-dock-rail = { workspace = true }
llimphi-widget-navigator = { workspace = true }
llimphi-widget-segmented = { workspace = true }
# Íconos vectoriales (Lucide-like) para los dientes de los rails — coloreados.
llimphi-icons = { workspace = true }
# Wrap + chip para el grid de íconos del menú activities GNOME.
llimphi-widget-wrap = { workspace = true }
llimphi-widget-chip = { workspace = true }
# Control panel (quick settings): sliders de volumen/brillo + switches wifi/bt.
llimphi-widget-slider = { workspace = true }
llimphi-widget-switch = { workspace = true }
# Protocolo de query de nouser (list_monads / resolve_monad) — fuente
# autoritativa de qué archivos componen una Mónada. Importamos sólo los wire
# types + cliente blocking, sin arrastrar el engine (notify/sled/blake3).
chasqui-card = { path = "../../chasqui/chasqui-card" }
# Descubrimiento del socket del daemon vía broker brahman (Card consumer +
# await_provider_blocking), con fallback al default path. Mismo patrón que
# chasqui-explorer-llimphi.
card-sidecar = { path = "../../chasqui/card-sidecar" }
# Config GLOBAL del escritorio (incl. dónde van los dientes): una sola fuente
# de verdad que todas las apps respetan.
wawa-config = { path = "../../../shared/wawa-config" }
# MonadId = Ulid: derivamos NavId deterministas de sus bytes; los tests crean ids.
ulid = { workspace = true }
llimphi-theme = { workspace = true }
llimphi-motion = { workspace = true }
# Íconos `.desktop` reales en el menú de inicio: resolución XDG mínima +
# parseo SVG vía vello_svg, cacheado entre frames.
llimphi-svg = { workspace = true }
# Decode de íconos raster (PNG/XPM-no, la mayoría del software del sistema trae
# PNG, no SVG) a `peniko::Image` para `View::image`.
llimphi-image = { workspace = true }
chrono = { workspace = true }
# Parseo del JSON del clima (widget `weather`): wttr.in / open-meteo por curl.
serde_json = { workspace = true }
# Backend wlr-layer-shell (Linux/Wayland): hace que pata se siente al nivel de
# eww/waybar — layer surface anclada con exclusive zone, no una ventana cliente.
smithay-client-toolkit = "0.19"
wayland-client = "0.31"
# Lista de ventanas (widget `window_list`): wlr-foreign-toplevel-management, el
# protocolo que usan waybar/eww para enumerar y activar toplevels en wlroots.
wayland-protocols-wlr = { version = "0.3", features = ["client"] }
# Bandeja del sistema (widget `tray`): StatusNotifierItem sobre D-Bus. pata corre
# como watcher+host en un hilo aparte con zbus async sobre un runtime tokio
# current-thread (el workspace fija zbus con la feature `tokio`, no la blocking).
zbus = { workspace = true }
tokio = { workspace = true }
# Decodificar PNG de íconos del tray resueltos por nombre (IconName).
image = { workspace = true }
raw-window-handle = { workspace = true }
pollster = { workspace = true }

[dev-dependencies]
# Verificación headless de widgets a PNG (ej. `examples/badge_largo`).
png = { workspace = true }
