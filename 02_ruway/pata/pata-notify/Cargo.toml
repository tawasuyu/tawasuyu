[package]
name = "pata-notify"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "Daemon de notificaciones de escritorio de tawasuyu: implementa org.freedesktop.Notifications (D-Bus) y se pinta a sí mismo como una caja wlr-layer-shell en la esquina (toasts), reusando llimphi-widget-toast. Agnóstico del compositor (mirada/Sway/Hyprland). Persiste cada notificación en un store sled — sustrato para el panel de historial y la capa de triage semántico/IA."

[[bin]]
name = "pata-notify"
path = "src/main.rs"

# El panel de historial: cliente del daemon (no abre el sled directo, lo
# consulta por D-Bus), dockeado como sidebar derecho vía llimphi-layer.
[[bin]]
name = "pata-notify-panel"
path = "src/bin/panel.rs"

[lib]
path = "src/lib.rs"

[dependencies]
llimphi-ui = { workspace = true }
llimphi-layer = { workspace = true }
llimphi-widget-toast = { workspace = true }
llimphi-widget-scroll = { workspace = true }
zbus = { workspace = true }
tokio = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
sled = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
postcard = { workspace = true }
