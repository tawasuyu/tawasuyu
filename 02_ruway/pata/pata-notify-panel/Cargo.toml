[package]
name = "pata-notify-panel"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "Panel de historial de notificaciones: sidebar derecho (wlr-layer-shell) que muestra el historial AGRUPADO por la capa de triage semántico. Cliente del daemon pata-notify — consulta por D-Bus y refresca por la señal Cambio (sin polling). Vive aparte de pata-notify para no meterle al daemon las deps de embeddings/LLM."

[[bin]]
name = "pata-notify-panel"
path = "src/main.rs"

[dependencies]
bitacora = { workspace = true }
pata-notify = { path = "../pata-notify" }
pata-notify-triage = { path = "../pata-notify-triage" }
rimay-verbo = { path = "../../../00_unanchay/rimay/rimay-verbo" }
rimay-verbo-core = { path = "../../../00_unanchay/rimay/rimay-verbo-core" }
llimphi-ui = { workspace = true }
llimphi-layer = { workspace = true }
llimphi-widget-scroll = { workspace = true }
zbus = { workspace = true }
tokio = { workspace = true }
futures = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
serde_json = { workspace = true }
