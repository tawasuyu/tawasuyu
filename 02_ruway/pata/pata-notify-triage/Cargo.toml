[package]
name = "pata-notify-triage"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "Capa de triage semántico/IA sobre el historial de pata-notify: agrupa notificaciones por similitud coseno (embeddings de rimay-verbo), las clasifica con reglas semánticas (priorizar/silenciar/sugerir por significado, no regex), y resume cada grupo con un LLM (pluma-llm). Lee el historial por D-Bus — no toca el daemon. Lib + CLI que imprime el digest como texto."

[[bin]]
name = "pata-notify-triage"
path = "src/main.rs"

[lib]
path = "src/lib.rs"

[dependencies]
bitacora = { workspace = true }
pata-notify = { path = "../pata-notify" }
rimay-verbo = { path = "../../../00_unanchay/rimay/rimay-verbo" }
rimay-verbo-core = { path = "../../../00_unanchay/rimay/rimay-verbo-core" }
pluma-llm = { path = "../../../00_unanchay/pluma/pluma-llm" }
pluma-llm-core = { path = "../../../00_unanchay/pluma/pluma-llm-core" }
tokio = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }

[dev-dependencies]
rimay-verbo-mock = { path = "../../../00_unanchay/rimay/rimay-verbo-mock" }
