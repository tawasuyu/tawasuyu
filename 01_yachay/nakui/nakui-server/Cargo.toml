[package]
name = "nakui-server"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "nakui — servidor autoritativo headless: hospeda el escritor (WAL + executors por módulo) y lo sirve a clientes remotos por card-net. El host de un workspace multi-usuario."

[[bin]]
name = "nakui-server"
