[package]
name = "nakui-ui-llimphi"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Nakui — runtime Llimphi de la metainterfaz. Carga module.json desde un directorio, monta sidebar de módulos + menú + área principal. Meta-form Llimphi vivo con las cuatro vistas: List (filas reales, editar/borrar/+Nuevo, 👁 detalle), Form (seed/edición/morphism), Detail (ficha + relacionados) y Dashboard (KPIs Count/Sum/GroupBy) sobre el event log del backend."

[dependencies]
nakui-core = { path = "../nakui-core" }
nahual-meta-schema = { path = "../../../02_ruway/nahual/libs/meta-schema" }
nahual-meta-runtime = { path = "../../../02_ruway/nahual/libs/meta-runtime" }
cards = { path = "../../../02_ruway/cards" }
llimphi-ui = { workspace = true }
llimphi-theme = { workspace = true }
llimphi-widget-app-header = { workspace = true }
llimphi-widget-banner = { workspace = true }
llimphi-widget-list = { workspace = true }
llimphi-widget-button = { workspace = true }
llimphi-widget-field = { workspace = true }
llimphi-widget-text-input = { workspace = true }
serde_json = { workspace = true }
uuid = { workspace = true, features = ["serde"] }
rimay-localize = { path = "../../../shared/rimay-localize" }

[[bin]]
name = "nakui-ui-llimphi"
path = "src/main.rs"

[dev-dependencies]
tempfile = { workspace = true }
