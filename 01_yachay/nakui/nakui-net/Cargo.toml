[package]
name = "nakui-net"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "nakui — transporte de red soberano sobre card-net (libp2p): servidor que hospeda el escritor autoritativo y CardNetTransport (impl Transport de nakui-sync) para clientes remotos. LAN directa o WAN con NAT-traversal, mismo protocolo."

[lib]
doctest = false

[dependencies]
nakui-sync = { path = "../nakui-sync" }
nakui-core = { path = "../nakui-core" }
nahual-meta-runtime = { path = "../../../02_ruway/nahual/libs/meta-runtime" }
card-net = { path = "../../../shared/card/card-net" }
tokio = { workspace = true }
tokio-util = { workspace = true }
futures = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
uuid = { workspace = true, features = ["serde", "v4"] }
thiserror = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
