[package]
name = "tinkuy-llimphi"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "tinkuy — frontend Llimphi del motor de partículas. E1 del roadmap: panel único con tiles draggables (visor 3D · fuerzas · observables · scrubber snapshots). Driver tinkuy-core en el hilo de UI con un Msg::Tick periódico."

[dependencies]
llimphi-ui               = { workspace = true }
llimphi-theme            = { workspace = true }
llimphi-widget-tiled     = { workspace = true }
llimphi-widget-nodegraph = { workspace = true }
llimphi-widget-menubar      = { workspace = true }
llimphi-widget-context-menu = { workspace = true }
llimphi-widget-toast        = { workspace = true }
llimphi-widget-empty        = { workspace = true }
llimphi-icons               = { workspace = true }
llimphi-motion              = { workspace = true }
app-bus                     = { workspace = true }
tinkuy-core   = { path = "../tinkuy-core" }
tinkuy-dsl    = { path = "../tinkuy-dsl" }
tinkuy-forces = { path = "../tinkuy-forces" }

[dev-dependencies]
# Sólo para el example `pantallazo_tinkuy` (volcado headless a PNG).
pollster = { workspace = true }
png = { workspace = true }

[[example]]
name = "tinkuy_demo"
path = "examples/tinkuy_demo.rs"

[[example]]
name = "pantallazo_tinkuy"
path = "examples/pantallazo_tinkuy.rs"
