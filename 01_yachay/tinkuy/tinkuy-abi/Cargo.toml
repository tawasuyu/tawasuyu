[package]
name = "tinkuy-abi"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "tinkuy — ABI estable C-friendly (extern \"C\", punteros opacos, errores i32). Capa de cruce entre el motor Rust y los hosts WASM (Wawa, navegador). El crate cdylib `tinkuy-wasm` la re-exporta para wasm32-unknown-unknown."

[features]
default = ["cpu"]
cpu = ["tinkuy-core/cpu", "tinkuy-forces/cpu", "dep:rayon"]
wasm = ["tinkuy-core/wasm", "tinkuy-forces/wasm"]

[dependencies]
tinkuy-core   = { path = "../tinkuy-core",   default-features = false }
tinkuy-forces = { path = "../tinkuy-forces", default-features = false }
rayon = { workspace = true, optional = true }
