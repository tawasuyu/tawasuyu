[package]
name = "cosmos-server"
version = { workspace = true }
edition = { workspace = true }
license = { workspace = true }
description = "Cosmobiología — server HTTP single-user. axum + cosmos-engine. Sirve cartas y assets del cliente web. CRUD completo de groups/contacts/charts."

[dependencies]
cosmos-engine = { path = "../cosmos-engine" }
cosmos-model = { path = "../cosmos-model" }
cosmos-render = { path = "../cosmos-render" }
cosmos-store = { path = "../cosmos-store" }

tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
directories = { workspace = true }
clap = { version = "4", features = ["derive"] }
axum = "0.7"
tower-http = { version = "0.6", features = ["cors", "trace", "fs"] }

[[bin]]
name = "cosmos-server"
path = "src/main.rs"
