[package]
name = "cosmos-app"
version = { workspace = true }
edition = { workspace = true }
license = { workspace = true }
description = "Tahuantinsuyu — estudio profesional de astrología. Tree + canvas + panel sobre yahweh + cosmos-astrology."

[dependencies]
cosmos-card = { path = "../cosmos-card" }
cosmos-canvas = { path = "../cosmos-canvas" }
cosmos-engine = { path = "../cosmos-engine" }
cosmos-model = { path = "../cosmos-model" }
cosmos-modules = { path = "../cosmos-modules" }
cosmos-panel = { path = "../cosmos-panel" }
cosmos-store = { path = "../cosmos-store" }
cosmos-theme = { path = "../cosmos-theme" }
cosmos-tree = { path = "../cosmos-tree" }
card-sidecar = { path = "../../../shared/card/card-sidecar" }

nahual-core = { workspace = true }
nahual-theme = { workspace = true }
nahual-widget-theme-switcher = { path = "../../../02_ruway/nahual/widgets/theme-switcher" }
nahual-widget-splitter = { workspace = true }
nahual-widget-container-core = { workspace = true }
gpui = { workspace = true }
directories = { workspace = true }
serde_json = { workspace = true }

[dev-dependencies]
# TestAppContext + #[gpui::test] para tests de integración del shell.
gpui = { workspace = true, features = ["test-support"] }

[[bin]]
name = "cosmos-app"
path = "src/main.rs"
