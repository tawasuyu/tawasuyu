[package]
name = "cosmobiologia"
version = { workspace = true }
edition = { workspace = true }
license = { workspace = true }
description = "Tahuantinsuyu — estudio profesional de astrología. Tree + canvas + panel sobre yahweh + eternal-astrology."

[dependencies]
cosmobiologia-card = { path = "../cosmos-card" }
cosmobiologia-canvas = { path = "../cosmos-canvas" }
cosmobiologia-engine = { path = "../cosmos-engine" }
cosmobiologia-model = { path = "../cosmos-model" }
cosmobiologia-modules = { path = "../cosmos-modules" }
cosmobiologia-panel = { path = "../cosmos-panel" }
cosmobiologia-store = { path = "../cosmos-store" }
cosmobiologia-theme = { path = "../cosmos-theme" }
cosmobiologia-tree = { path = "../cosmos-tree" }
brahman-sidecar = { path = "../../../shared/card/card-sidecar" }

nahual-core = { workspace = true }
nahual-theme = { workspace = true }
nahual-widget-theme-switcher = { path = "../../../02_ruway/nahual/widgets/theme-switcher" }
nahual-widget-splitter = { workspace = true }
nahual-widget-container-core = { workspace = true }
gpui = { workspace = true }
directories = { workspace = true }
serde_json = { workspace = true }

[dev-dependencies]
# TestAppContext + #[gpui::test] para tests de integración del shell.
gpui = { workspace = true, features = ["test-support"] }

[[bin]]
name = "cosmobiologia"
path = "src/main.rs"
