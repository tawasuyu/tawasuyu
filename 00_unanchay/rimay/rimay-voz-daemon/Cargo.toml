[package]
name = "rimay-voz-daemon"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "voz — daemon multi-instancia: sirve backends de STT (Transcriptor) y TTS (Locutor) sobre un socket Unix; el DaemonClient los consume desde otro proceso cumpliendo los mismos traits. Un modelo cargado, N procesos — gemelo de rimay-verbo-daemon, es el brazo local del híbrido de voz."

[dependencies]
rimay-voz-core = { path = "../rimay-voz-core" }
async-trait = { workspace = true }
tokio = { workspace = true }
serde = { workspace = true }
postcard = { workspace = true }

[dev-dependencies]
rimay-voz-mock = { path = "../rimay-voz-mock" }
