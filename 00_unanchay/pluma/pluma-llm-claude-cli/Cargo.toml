[package]
name = "pluma-llm-claude-cli"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "pluma — backend LLM que maneja el binario `claude` (Claude Code) como subproceso (`claude -p --output-format json`). Usa la AUTENTICACIÓN de Claude Code (suscripción Pro/Max por OAuth, o su API key) sin que la app toque el token: Claude Code hace el auth, este crate sólo invoca. La forma legítima de usar una suscripción desde software propio."

[dependencies]
async-trait = { workspace = true }
pluma-llm-core = { path = "../pluma-llm-core" }
serde_json = { workspace = true }
base64 = { workspace = true }
tokio = { workspace = true }
