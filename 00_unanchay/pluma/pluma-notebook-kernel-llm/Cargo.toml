[package]
name = "pluma-notebook-kernel-llm"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "pluma — kernel de notebook que despacha al ChatClient transparente. Una celda es código `language = \"llm-traducir-qu\"|\"llm-tono-formal\"|\"llm-prompt\"|...` con su texto fuente como input; el output va al `payload: Text` de la celda."

[dependencies]
async-trait = { workspace = true }
pluma-notebook-core = { path = "../pluma-notebook-core" }
pluma-notebook-exec = { path = "../pluma-notebook-exec" }
pluma-llm-core = { path = "../pluma-llm-core" }

[dev-dependencies]
tokio = { workspace = true }
pluma-llm-mock = { path = "../pluma-llm-mock" }
