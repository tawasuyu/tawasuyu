[package]
name = "pluma-app"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "pluma-app — editor de escritura DAG: ventana Llimphi con el documento como grafo de átomos narrativos, conectores de dependencia y osciloscopio de coherencia."

[[bin]]
name = "pluma-app"
path = "src/main.rs"

[dependencies]
pluma-core = { path = "../pluma-core" }
pluma-graph = { path = "../pluma-graph" }
pluma-render-plan = { path = "../pluma-render-plan" }
pluma-editor-llimphi = { path = "../pluma-editor-llimphi" }
llimphi-ui = { workspace = true }
llimphi-theme = { workspace = true }
llimphi-widget-button = { workspace = true }
llimphi-widget-splitter = { workspace = true }
uuid = { workspace = true }
