[package]
name = "pluma-notebook-core"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "pluma-notebook-app — núcleo de notebooks reproducibles: celdas en DAG, propagación de staleness y digest Merkle que certifica reproducibilidad."

[dependencies]
blake3 = { workspace = true }
serde = { workspace = true }
# FASE 43 :: convergencia del tejido celular. `pluma-notebook-core`
# re-exporta `format::CeldaWawa` para que el motor Linux y el kernel
# bare-metal hablen un unico idioma sobre las celdas Forth+macro. La
# riqueza historica (`Cell`, `CellKind`, outputs tipados) se conserva
# para el ecosistema de notebooks markdown/code/LLM del host; pero la
# representacion canonica de la celda Forth/macro queda en `format`.
format = { path = "../../../shared/format" }
