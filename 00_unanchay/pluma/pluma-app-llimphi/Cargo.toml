[package]
name = "pluma-app-llimphi"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "pluma-app-llimphi — editor de escritura multilienzo: panel de documentos del sled, cuerpo_ide central editable, panel LLM con cycler de backends y derivación de hijas."

[[bin]]
name = "pluma-app-llimphi"
path = "src/main.rs"

[dependencies]
pluma-core = { path = "../pluma-core" }
pluma-cuerpo = { path = "../pluma-cuerpo" }
pluma-md = { path = "../pluma-md" }
foreign-docx = { path = "../foreign-docx" }
pluma-align = { path = "../pluma-align" }
pluma-editor-cuerpo = { path = "../pluma-editor-cuerpo" }
pluma-editor-llimphi = { path = "../pluma-editor-llimphi" }
pluma-outline = { path = "../pluma-outline" }
# Modo Presentar: el documento se vuela como un deck (cámara Prezi) usando el
# árbol de secciones como marcos espaciales.
pluma-deck-core = { path = "../pluma-deck-core" }
pluma-deck-outline = { path = "../pluma-deck-outline" }
pluma-deck-recorrido-llimphi = { path = "../pluma-deck-recorrido-llimphi" }
# Celdas ejecutables (notebook embebido): kernels reales por lenguaje.
pluma-notebook-exec = { path = "../pluma-notebook-exec" }
pluma-notebook-kernel-python = { path = "../pluma-notebook-kernel-python" }
pluma-notebook-kernel-wasm = { path = "../pluma-notebook-kernel-wasm" }
pluma-reactor = { path = "../pluma-reactor" }
pluma-transform = { path = "../pluma-transform" }
pluma-transform-llm = { path = "../pluma-transform-llm" }
pluma-llm = { path = "../pluma-llm" }
pluma-llm-core = { path = "../pluma-llm-core" }
# Filtro Concepto del diente Grafo: scoring semántico por embeddings vía el
# verbo-daemon (fallback léxico si el socket no está).
rimay-verbo-core = { path = "../../rimay/rimay-verbo-core" }
rimay-verbo-daemon = { path = "../../rimay/rimay-verbo-daemon" }
llimphi-ui = { workspace = true }
# Rail hospedado: pluma puede prestar sus secciones (Documentos/LLM/Buscar/Diff)
# al rail de pata y colapsar sus columnas (PLUMA_DELEGATE_SIDEBAR).
pata-host = { path = "../../../02_ruway/pata/pata-host" }
llimphi-theme = { workspace = true }
llimphi-widget-button = { workspace = true }
llimphi-widget-splitter = { workspace = true }
llimphi-widget-list = { workspace = true }
llimphi-widget-dock-rail = { workspace = true }
llimphi-icons = { workspace = true }
llimphi-widget-text-editor = { workspace = true }
llimphi-widget-text-input = { workspace = true }
llimphi-widget-menubar = { workspace = true }
llimphi-widget-edit-menu = { workspace = true }
llimphi-widget-context-menu = { workspace = true }
llimphi-widget-modal = { workspace = true }
llimphi-widget-segmented = { workspace = true }
llimphi-widget-switch = { workspace = true }
llimphi-widget-select = { workspace = true }
llimphi-widget-color-picker = { workspace = true }
llimphi-widget-nodegraph = { workspace = true }
pluma-estilo = { path = "../pluma-estilo" }
pluma-proyecto = { path = "../pluma-proyecto" }
rhai = "1"
llimphi-motion = { workspace = true }
app-bus = { workspace = true }
tokio = { workspace = true }
uuid = { workspace = true }
arboard = { workspace = true }
# Sólo para el subcomando `--dump <out.png>`: render headless de la vista.
png = { workspace = true }
pollster = { workspace = true }

[dev-dependencies]
# Provider de embeddings determinista para testear el filtro Concepto sin daemon.
rimay-verbo-mock = { path = "../../rimay/rimay-verbo-mock" }
