[package]
name = "pluma-proyecto"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "pluma — formato de archivo de proyecto (.pluma) con control de versiones: un DAG content-addressed (BLAKE3 + postcard, reusando shared/format) de snapshots de varios documentos multilienzo, con ramas y merge."

[dependencies]
format = { path = "../../../shared/format" }
serde = { workspace = true }
postcard = { workspace = true }
uuid = { workspace = true, features = ["serde"] }
pluma-core = { path = "../pluma-core" }
pluma-cuerpo = { path = "../pluma-cuerpo" }
pluma-align = { path = "../pluma-align" }
pluma-transform = { path = "../pluma-transform" }
pluma-estilo = { path = "../pluma-estilo" }

[dev-dependencies]
tempfile = { workspace = true }
