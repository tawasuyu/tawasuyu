[package]
name = "pluma-notebook-llimphi"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "pluma-notebook — visor sobre Llimphi: lineal o canvas (pan + drag), con botón 'ejecutar desde aquí' que invoca run_from contra el kernel WASM. Sin edición de fuentes todavía."

[[bin]]
name = "pluma-notebook-llimphi"
path = "src/main.rs"

[dependencies]
pluma-notebook-core = { path = "../pluma-notebook-core" }
pluma-notebook-store = { path = "../pluma-notebook-store" }
pluma-notebook-exec = { path = "../pluma-notebook-exec" }
pluma-notebook-kernel-media = { path = "../pluma-notebook-kernel-media" }
pluma-notebook-kernel-wasm = { path = "../pluma-notebook-kernel-wasm" }
pluma-notebook-kernel-python = { path = "../pluma-notebook-kernel-python" }
async-trait = { workspace = true }
llimphi-ui = { workspace = true }
llimphi-theme = { workspace = true }
llimphi-widget-text-editor = { workspace = true }
llimphi-widget-menubar = { workspace = true }
llimphi-widget-edit-menu = { workspace = true }
llimphi-widget-context-menu = { workspace = true }
llimphi-motion = { workspace = true }
llimphi-clipboard = { workspace = true }
app-bus = { workspace = true }
tokio = { workspace = true }
