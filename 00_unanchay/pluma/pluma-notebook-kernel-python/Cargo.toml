[package]
name = "pluma-notebook-kernel-python"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "pluma-notebook — kernel Python sobre RustPython (intérprete Python 3 en Rust). Evalúa expresiones single-line del notebook; captura el repr del resultado como OutputPayload::Text. Segundo backend del trait Kernel tras wasmi."

[dependencies]
pluma-notebook-core = { path = "../pluma-notebook-core" }
pluma-notebook-exec = { path = "../pluma-notebook-exec" }
async-trait = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
# RustPython como dep directa (no workspace) — uso único + features
# mínimos. Compile inicial es pesado (~1-2 min); ejecución es rápida.
rustpython-vm = { version = "0.4", default-features = false, features = ["compiler", "importlib"] }

[dev-dependencies]
tokio = { workspace = true }
