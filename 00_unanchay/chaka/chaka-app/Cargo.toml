[package]
name = "charka"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "charka — CLI del transpilador COBOL→Rust: transpila, ejecuta y valida programas COBOL."

[[bin]]
name = "charka"
path = "src/main.rs"

[dependencies]
charka-lexer = { path = "../chaka-lexer" }
charka-parser = { path = "../chaka-parser" }
charka-ir = { path = "../chaka-ir" }
charka-codegen = { path = "../chaka-codegen" }
charka-shadow = { path = "../chaka-shadow" }
clap = { workspace = true }
anyhow = { workspace = true }
