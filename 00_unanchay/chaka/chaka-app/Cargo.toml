[package]
name = "chaka-app"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "chaka-app — CLI del transpilador COBOL→Rust: transpila, ejecuta y valida programas COBOL."

[[bin]]
name = "chaka-app"
path = "src/main.rs"

[dependencies]
chaka-lexer = { path = "../chaka-lexer" }
chaka-parser = { path = "../chaka-parser" }
chaka-ir = { path = "../chaka-ir" }
chaka-codegen = { path = "../chaka-codegen" }
chaka-shadow = { path = "../chaka-shadow" }
clap = { workspace = true }
anyhow = { workspace = true }
