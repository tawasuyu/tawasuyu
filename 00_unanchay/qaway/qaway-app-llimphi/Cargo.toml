# =============================================================================
#  tawasuyu :: qaway — cliente de plataforma de video (tipo FreeTube), UI Llimphi
# -----------------------------------------------------------------------------
#  PERCIBIR (00_unanchay): descubrir/ver el mundo del video federado, como
#  puriy es al navegador. Compone dos piezas existentes sin reimplementar nada:
#    - DESCUBRIR: `foreign-platform` (trait agnóstico + providers REST en RON)
#    - REPRODUCIR: lanza el binario `media-app <url>` (ya resuelve yt-dlp/DASH/
#      ffmpeg, R1/R2 de PARIDAD.md). qaway NO duplica el pipeline de red.
#  Miniaturas por `llimphi-image` (feature `net`: descarga+caché por URL).
# =============================================================================

[package]
name = "qaway-app-llimphi"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "qaway — cliente de plataforma de video (FreeTube-like) en Llimphi: búsqueda + grilla de miniaturas sobre foreign-platform (Invidious/PeerTube); el play lanza media-app."

[[bin]]
name = "qaway"
path = "src/main.rs"

[dependencies]
llimphi-ui = { workspace = true }
llimphi-theme = { workspace = true }
llimphi-widget-text-input = { workspace = true }
llimphi-widget-grid = { workspace = true }
llimphi-image = { path = "../../../02_ruway/llimphi/llimphi-image", features = ["net"] }
foreign-platform = { path = "../../../shared/foreign-platform" }
