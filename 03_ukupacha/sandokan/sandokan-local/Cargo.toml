[package]
name = "sandokan-local"
description = "LocalEngine: implementación in-process del orquestador sandokan. Encarna Cards vía arje-incarnate, trackea lifecycle, reaping."
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true

[dependencies]
sandokan-core = { path = "../../../shared/sandokan/sandokan-core" }
sandokan-lifecycle = { path = "../../../shared/sandokan/sandokan-lifecycle" }
arje-incarnate = { path = "../../arje/init/arje-incarnate" }
# Encarnación de Payload::Wasm: arje-cas resuelve module_sha256 → bytes,
# arje-wasm los corre en wasmi (mismo runtime que el kernel de wawa).
arje-cas = { path = "../../arje/runtime/arje-cas" }
arje-wasm = { path = "../../arje/runtime/arje-wasm" }
card-core = { path = "../../../shared/card/card-core" }
async-trait = { workspace = true }
tokio = { workspace = true }
# `term` agrega openpty/Winsize para las sesiones interactivas (PTY).
nix = { workspace = true, features = ["term"] }
libc = { workspace = true }
ulid = { workspace = true }
# Snapshot/re-hidratación de sesiones interactivas (persist.rs).
serde = { workspace = true }
serde_json = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
