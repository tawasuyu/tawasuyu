[package]
name = "arje-applaunch"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "arje-applaunch — puente de lanzamiento app-bus↔arje. Cuando el orquestador (arje) está levantado, entrega la app como Ente OneShot supervisado vía RunCard sobre arje-bus; si no hay bus (o arje la rechaza), cae al spawn crudo del host. El mismo helper lo usan pata (menú de inicio) y shuma (barra) — coordinación opt-in con fallback, igual que el session-manager de mirada pero sin re-floor (las apps de usuario son OneShot, no de sesión)."

[dependencies]
app-bus = { path = "../../../shared/app-bus" }
arje-bus = { path = "../runtime/arje-bus" }
arje-card = { path = "../arje-card" }
tokio = { workspace = true }
