[package]
name = "arje-zero"
version = "0.0.1"
edition.workspace = true
license.workspace = true
publish.workspace = true

[[bin]]
name = "arje-zero"
path = "src/main.rs"

[dependencies]
bitacora = { workspace = true }
# Lib crates del fractal — orden: contratos → infra → encarnación → orquestación
arje-card = { path = "../../arje-card" }
arje-bus = { path = "../../runtime/arje-bus" }
arje-cas = { path = "../../runtime/arje-cas" }
arje-kernel = { path = "../arje-kernel" }
arje-soma = { path = "../arje-soma" }
arje-incarnate = { path = "../arje-incarnate" }   # cgroup::{set_cpu_weight,set_frozen} para reweight/freeze en caliente
arje-wasm = { path = "../../runtime/arje-wasm" }
arje-snapshot = { path = "../arje-snapshot" }
arje-brain = { path = "../../runtime/arje-brain" }
arje-attest = { path = "../../runtime/arje-attest" }   # atestación al arranque (A2)
arje-echo = { path = "../../runtime/arje-echo" }   # solo para constantes del demo
# Política de ciclo de vida canónica (backoff/restart) — fuente única (ver shared/sandokan/SDD.md §5 Fase 1)
sandokan-lifecycle = { path = "../../../../shared/sandokan/sandokan-lifecycle" }

# Brahman protocol — handshake para módulos brahman conscientes
card-handshake = { path = "../../../../02_ruway/chasqui/card-handshake" }
chasqui-broker = { path = "../../../../02_ruway/chasqui/chasqui-broker" }
card-admin = { path = "../../../../02_ruway/chasqui/card-admin" }
card-net = { path = "../../../../shared/card/card-net" }

# Runtime / utilidades de PID 1
serde = { workspace = true }
serde_json = { workspace = true }
ulid = { workspace = true }
tokio = { workspace = true }
nix = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
