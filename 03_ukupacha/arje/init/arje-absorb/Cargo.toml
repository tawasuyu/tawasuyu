[package]
name = "arje-absorb"
version = "0.0.1"
edition.workspace = true
license.workspace = true
publish.workspace = true
description = "arje-absorb — lee la configuración de otro init (sysvinit/runit/dinit/openrc) y la traduce a una Tarjeta Semilla brahman."

[[bin]]
name = "arje-absorb"
path = "src/main.rs"

[dependencies]
card-core = { path = "../../../../shared/card/card-core" }
arje-attest = { path = "../../runtime/arje-attest" }   # firmar el manifiesto de atestación (A1)
anyhow = { workspace = true }
serde_json = { workspace = true }   # leer concesiones pre-firmadas de hammer (--attest-from)

[dev-dependencies]
tempfile = { workspace = true }
