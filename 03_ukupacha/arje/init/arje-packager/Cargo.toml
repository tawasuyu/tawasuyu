[package]
name = "arje-packager"
version = "0.0.1"
edition.workspace = true
license.workspace = true
publish.workspace = true
description = "arje-packager — arma initramfs (cpio newc + gzip) bootable a partir de una Tarjeta Semilla. Pega los binarios declarados en su genesis y deja /init listo para PID 1."

[lib]
name = "arje_packager"
path = "src/lib.rs"

[[bin]]
name = "arje-packager"
path = "src/main.rs"

[dependencies]
arje-card = { path = "../../arje-card" }
flate2 = { workspace = true }
anyhow = { workspace = true }
serde_json = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
