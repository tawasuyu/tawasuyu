[package]
name = "arje-loader"
version = "0.0.1"
edition = "2021"
rust-version = "1.80"
license = "MIT OR Apache-2.0"
publish = false
description = "arje-loader — bootloader EFI propio del fractal. Lee /loader/entries/arje.conf, carga el kernel Linux (EFISTUB PE) con sus initramfs y cmdline, y le entrega el control. Sin systemd-boot ni rEFInd."

[[bin]]
name = "arje-loader"
path = "src/main.rs"

# Este crate sale del workspace del root porque su target (x86_64-unknown-uefi)
# es no-std/no-host. Si se incluyera como member, `cargo check --workspace`
# del root intentaría compilarlo con el target del host y fallaría.
# Lo construimos siempre con --target=x86_64-unknown-uefi explícito.
[workspace]
# Workspace separado vacío — autosuficiente.

[dependencies]
uefi = { version = "0.35", features = ["panic_handler", "alloc", "global_allocator"] }
log = "0.4"

[profile.release]
opt-level = "s"
panic = "abort"
# Sin `lto`, `codegen-units = 1` ni `strip` — todos rompen la PE EFI bajo
# OVMF con "Invalid Parameter" en start_image. El binario gana unos KB pero
# arranca, que es lo único que importa para un bootloader.
