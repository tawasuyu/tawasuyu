[package]
name = "arje-card-llimphi"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "Card de escritorio Llimphi con el estado vivo del init arje: capacidades de aislamiento (namespaces, cgroups, privilegios) detectadas runtime vía arje-incarnate. Cumple la intención del README de arje ('card escritorio'), que arje-card nunca llegó a ser (quedó como alias de card-core). Mismo patrón que minga-explorer-llimphi."

[dependencies]
bitacora = { workspace = true }
arje-incarnate = { path = "../init/arje-incarnate" }
arje-brain = { path = "../runtime/arje-brain" }
card-core = { path = "../../../shared/card/card-core" }
sandokan-arje-engine = { path = "../../sandokan/sandokan-arje-engine" }
sandokan-monitor-core = { path = "../../../shared/sandokan/sandokan-monitor-core" }
sandokan-lifecycle = { path = "../../../shared/sandokan/sandokan-lifecycle" }
tokio = { workspace = true }
llimphi-ui = { workspace = true }
llimphi-theme = { workspace = true }
llimphi-widget-app-header = { workspace = true }
llimphi-widget-banner = { workspace = true }
llimphi-widget-button = { workspace = true }
llimphi-widget-stat-card = { workspace = true }
llimphi-widget-skeleton = { workspace = true }
llimphi-widget-menubar = { workspace = true }
llimphi-widget-context-menu = { workspace = true }
llimphi-motion = { workspace = true }
app-bus = { workspace = true }
wawa-config = { path = "../../../shared/wawa-config" }

[[bin]]
name = "arje-card-llimphi"
path = "src/main.rs"
