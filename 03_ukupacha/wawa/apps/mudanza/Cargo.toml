# =============================================================================
#  renaser :: apps/mudanza — Fase 25 :: centro de control soberano de raices
# -----------------------------------------------------------------------------
#  Mudanza es la unica app del genesis que invoca `sys_manifiesto_proponer`.
#  Escucha los frames `AnunciarCanal` que llegan por la red Akasha, presenta
#  al usuario la propuesta —el hash, el autor, la firma— y, si el operador
#  consiente con Alt+Enter, traslada el sobre criptografico al kernel. El
#  kernel verifica Ed25519 contra `claves::AGORA_PUBLIC_KEY_LOCAL` y, solo si
#  la firma es licita, reanca el manifiesto en una sola escritura atomica
#  del superbloque.
# =============================================================================

[package]
name = "mudanza"
version = "0.1.0"
edition = "2021"
description = "renaser :: app WASM de propuesta de reancla del manifiesto"

[workspace]

[lib]
crate-type = ["cdylib"]

[dependencies]
# `ed25519-compact` es la misma libreria que el kernel usa en `claves.rs`
# para verificar `ManifiestoFirmado`. Al validar en userspace antes del
# syscall usamos las mismas primitivas — un sobre que la app acepta es
# uno que el kernel ALSO aceptaria criptograficamente (modulo el filtro
# por anillo de autores, que solo vive en kernel).
#
# El layout del sobre (postcard de `format::ManifiestoFirmado`) es 128 B
# raw — `hash(32) || autor(32) || firma(64)` — lo parseamos a mano para
# no arrastrar postcard + `extern crate alloc` solo por la deserializacion.
# El test `manifiesto_firmado_layout_es_128_bytes_raw` en `agora-channel`
# protege ese contrato; si format cambia, el test rompe y este parser
# necesita actualizarse.
ed25519-compact = { version = "2", default-features = false }

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"
opt-level = "s"
lto = true
