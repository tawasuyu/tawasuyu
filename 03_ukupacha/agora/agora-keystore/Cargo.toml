[package]
name = "agora-keystore"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "agora — almacén cifrado de seeds privadas Ed25519. Argon2id sobre passphrase + ChaCha20-Poly1305 sobre seed[32]. Las claves privadas nunca se serializan en claro ni viajan por la red."

[dependencies]
agora-core = { path = "../agora-core" }
argon2 = { workspace = true }
chacha20poly1305 = { workspace = true }
rand = { workspace = true }
directories = { workspace = true }
thiserror = { workspace = true }
# `aead` provee el trait Aead que ChaCha20Poly1305 implementa — lo necesitamos
# explícito porque chacha20poly1305 v0.10 lo reexporta como `aead::Aead` sin
# pull-in transitivo.
aead = "0.5"

[dev-dependencies]
tempfile = { workspace = true }
