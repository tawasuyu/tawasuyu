[package]
name = "agora-cli"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "agora-cli — CLI para operar el ágora desde shell: crear identidades, firmar atestaciones, verificar, importar/exportar y consultar el grafo. Comparte keystore y store con agora-app."

[[bin]]
name = "agora-cli"
path = "src/main.rs"

[dependencies]
agora-core = { path = "../agora-core" }
agora-graph = { path = "../agora-graph" }
agora-store = { path = "../agora-store" }
agora-keystore = { path = "../agora-keystore" }
agora-channel = { path = "../agora-channel" }
format = { path = "../../../shared/format" }
clap = { workspace = true }
directories = { workspace = true }
rand = { workspace = true }
postcard = { workspace = true }
serde = { workspace = true }
thiserror = { workspace = true }
