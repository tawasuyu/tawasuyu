[package]
name = "agora-cli"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "agora-cli — CLI para operar el ágora desde shell: crear identidades, firmar atestaciones, verificar, importar/exportar y consultar el grafo. Comparte keystore y store con agora-app."

[[bin]]
name = "agora-cli"
path = "src/main.rs"

[dependencies]
agora-core = { path = "../agora-core" }
agora-graph = { path = "../agora-graph" }
agora-store = { path = "../agora-store" }
agora-keystore = { path = "../agora-keystore" }
agora-channel = { path = "../agora-channel" }
# Desbloqueo de sesión: `agora-cli desbloquear` cachea la seed de identidad en el
# session keyring del kernel para que pacha cifre/descifre dotfiles sin re-pedir
# passphrase en cada conmutación de contexto (Fase 3 de pacha-dotfiles).
pacha-llavero = { path = "../../../shared/pacha/pacha-llavero" }
format = { path = "../../../shared/format" }
foreign-fs = { path = "../../../shared/foreign-fs" }
# Transporte AoE (raw sockets de capa 2) para `wawa anunciar`: difunde el
# AnunciarCanal firmado y sirve los objetos del bundle a una wawa en la misma
# red. Reusa el cliente ya probado en vez de duplicar el unsafe de libc.
wawa-explorer-aoe = { path = "../../wawa-explorer/wawa-explorer-aoe" }
clap = { workspace = true }
directories = { workspace = true }
rand = { workspace = true }
postcard = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
