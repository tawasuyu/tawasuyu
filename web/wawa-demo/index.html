<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>wawa · demo web</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="escritorio">
    <header id="barra">
      <span class="marca">wawa</span>
      <span class="separador">·</span>
      <span class="contexto">demo web — host wasmi del kernel en wasm32</span>
      <span class="estado" id="estado">cargando…</span>
    </header>

    <main id="lienzos">
      <section class="ventana" data-app="hello_wasm">
        <header class="titulo">
          <span class="punto"></span>
          <span class="nombre">hello_wasm</span>
          <span class="hint">W A S D para mover · click para enfocar</span>
        </header>
        <canvas id="canvas-hello" width="480" height="560" tabindex="0"></canvas>
      </section>
    </main>

    <footer id="pie">
      <span>
        binario <code>wawa-web</code> compilado a <code>wasm32-unknown-unknown</code> ·
        <code>wasmi</code> en wasm hostea las apps · capacidades <code>renaser::*</code>
        son las del kernel real
      </span>
    </footer>
  </div>

  <script type="module" src="bootstrap.js"></script>
</body>
</html>
