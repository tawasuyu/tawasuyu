[package]
name = "willay-rag"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true
description = "willay — preguntale a tus eventos. Motor RAG (impl rag-motor) sobre el centro de eventos: lee los eventos del daemon willay, los embebe (rimay-verbo), recupera por coseno y redacta una respuesta citando eventos (pluma-llm). El otro registro de la búsqueda, en lenguaje natural."

[lib]
path = "src/lib.rs"

[dependencies]
rag-motor = { workspace = true }
willay-core = { workspace = true }
willay-emit = { workspace = true }
rimay-verbo = { path = "../../../00_unanchay/rimay/rimay-verbo" }
pluma-llm = { path = "../../../00_unanchay/pluma/pluma-llm" }
wawa-config = { path = "../../wawa-config" }
tokio = { workspace = true, features = ["rt-multi-thread"] }

[dev-dependencies]
tokio = { workspace = true, features = ["rt", "macros"] }
